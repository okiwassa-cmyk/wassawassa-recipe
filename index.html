  var ov=document.createElement('div');
  ov.id='photo-modal';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:3000;display:flex;align-items:center;justify-content:center;cursor:pointer';
  ov.innerHTML='<img src="'+src+'" style="max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px"><button style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;font-size:24px;width:40px;height:40px;border-radius:50%;cursor:pointer;line-height:1">✕</button>';
  ov.onclick=function(){ov.remove();};
  document.body.appendChild(ov);
}

function showCourseFullscreen(courseId){
  var c = DB.courses.find(function(x){return x.id===courseId;});
  if(!c) return;
  var ex = document.getElementById('course-fullscreen-modal');
  if(ex) ex.remove();

  function makeDishRow(d){
    if(d.isPlate){
      var elemList = (d.elements||[]).map(function(e){
        var r = DB.recipes.find(function(x){return x.id===e.recipeId;});
        var ing = !r&&e.ingredientId?DB.ingredients.find(function(x){return x.id===e.ingredientId;}):null;
        if(!r&&!ing) return '';
        var name = r?r.name:(ing?ing.name:'');
        var rid = r?r.id:'';
        var perStr = r&&r.perServing?r.perServing+(r.perServingUnit||'')+'/人前':'';
        return '<div style="display:flex;align-items:baseline;gap:5px;padding:4px 0;border-bottom:1px solid var(--bg3);font-size:13px">'
          +'<span style="color:var(--accent-dark);flex-shrink:0">・</span>'
          +(r?'<span style="color:#1565c0;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:2px" onclick="document.getElementById(\'course-fullscreen-modal\').remove();viewRecipe(\''+rid+'\')">'+name+'</span>'
            :'<span style="color:#e65100;font-weight:600;cursor:pointer;text-decoration:underline" onclick="showIngModal(\''+e.ingredientId+'\')">'+name+'</span>')
          +(e.amount?'<span style="color:var(--text-muted);font-size:11px">'+e.amount+(e.unit||'')+'</span>':'')
          +(perStr?'<span style="color:var(--accent-dark);font-size:11px">'+perStr+'</span>':'')
          +'</div>';
      }).filter(Boolean).join('');
      return '<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px">'
        +'<div style="background:#2d4a30;color:white;padding:8px 14px;display:flex;align-items:center;gap:8px">'
        +(d.position?'<span style="background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:8px;font-size:11px">'+d.position+'</span>':'')
        +'<span style="font-size:14px;font-weight:600">🍽 '+(d.plateName||'プレート')+'</span>'
        +'</div>'
        +'<div style="display:flex">'
        +(d.platePhoto?'<img src="'+d.platePhoto+'" style="width:200px;min-height:160px;object-fit:contain;background:var(--bg3);flex-shrink:0;cursor:pointer" onclick="showPhotoModal(\''+d.platePhoto+'\')">':'<div style="width:200px;min-height:120px;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px">🍽</div>')
        +'<div style="flex:1;padding:12px;border-left:1px solid var(--bg3)">'
        +elemList
        +(d.platingMemo?'<div style="font-size:12px;color:#2d6a4f;background:#f0faf0;border-left:3px solid var(--accent);padding:6px 10px;border-radius:0 6px 6px 0;margin-top:8px">📝 '+d.platingMemo+'</div>':'')
        +'</div></div></div>';
    }
    var r = DB.recipes.find(function(x){return x.id===d.recipeId;});
    var dIng = !r&&d.ingredientId?DB.ingredients.find(function(x){return x.id===d.ingredientId;}):null;
    var photo = r&&r.photo?r.photo:'';
    var perStr = r&&r.perServing?r.perServing+(r.perServingUnit||'')+'/人前':'';
    return '<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px">'
      +'<div style="background:#2d4a30;color:white;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
      +(d.position?'<span style="background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:8px;font-size:11px">'+d.position+'</span>':'')
      +(r?'<span style="color:#81c784;font-weight:600;font-size:15px;cursor:pointer;text-decoration:underline" onclick="document.getElementById(\'course-fullscreen-modal\').remove();viewRecipe(\''+r.id+'\')">'+r.name+'</span>'
        :(dIng?'<span style="color:#ffcc80;font-weight:600;font-size:15px">'+dIng.name+'</span>':''))
      +(d.amount?'<span style="font-size:11px;opacity:0.8">'+d.amount+(d.unit||'')+'</span>':'')
      +(perStr?'<span style="font-size:11px;opacity:0.7">'+perStr+'</span>':'')
      +'</div>'
      +'<div style="display:flex">'
      +(photo?'<img src="'+photo+'" style="width:200px;min-height:140px;object-fit:contain;background:var(--bg3);flex-shrink:0;cursor:pointer" onclick="showPhotoModal(\''+photo+'\')">':'<div style="width:200px;min-height:100px;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px">🍳</div>')
      +'<div style="flex:1;padding:12px;border-left:1px solid var(--bg3)">'
      +(d.platingMemo?'<div style="font-size:12px;color:#2d6a4f;background:#f0faf0;border-left:3px solid var(--accent);padding:6px 10px;border-radius:0 6px 6px 0;">📝 '+d.platingMemo+'</div>':'<div style="font-size:12px;color:var(--text-muted)">盛り付けメモなし</div>')
      +'</div></div></div>';
  }

  var dishesHtml = (c.dishes||[]).map(makeDishRow).filter(Boolean).join('');

  var ov = document.createElement('div');
  ov.id = 'course-fullscreen-modal';
  ov.style.cssText = 'position:fixed;inset:0;background:var(--bg2);z-index:2000;display:flex;flex-direction:column;overflow:hidden';
  ov.innerHTML =
    '<div style="background:#2d4a30;color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">'
    +'<div>'
    +'<div style="font-size:10px;opacity:0.7;letter-spacing:.1em">WASSA WASSA</div>'
    +'<div style="font-size:20px;font-weight:700">'+c.name+'</div>'
    +'<div style="font-size:11px;opacity:0.7;margin-top:2px">'+(c.dishes?c.dishes.length:0)+'品構成</div>'
    +'</div>'
    +'<button onclick="document.getElementById(\'course-fullscreen-modal\').remove()" style="background:rgba(255,255,255,0.15);border:none;color:white;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit">✕ 閉じる</button>'
    +'</div>'
    +'<div style="flex:1;overflow-y:auto;padding:16px;max-width:800px;width:100%;margin:0 auto;box-sizing:border-box">'
    +dishesHtml
    +'</div>';
  document.body.appendChild(ov);
}

function showAllergenModal(courseId){
  var c=DB.courses.find(function(x){return x.id===courseId;});
  if(!c) return;
  var rows=[];
  (c.dishes||[]).forEach(function(d){
    if(d.isPlate){
      (d.elements||[]).forEach(function(e){
        var r=DB.recipes.find(function(x){return x.id===e.recipeId;});
        if(r) rows.push({name:(d.position?'['+d.position+'] ':'')+r.name, allergens:r.allergens||[]});
      });
    } else {
      var r=DB.recipes.find(function(x){return x.id===d.recipeId;});
      if(r) rows.push({name:(d.position?'['+d.position+'] ':'')+r.name, allergens:r.allergens||[]});
    }
  });
  var usedIds=new Set();
  rows.forEach(function(row){row.allergens.forEach(function(a){usedIds.add(a);});});
  var cols=ALLERGENS.filter(function(a){return usedIds.has(a.id);});
  if(cols.length===0){alert('このコースにはアレルゲン情報がありません');return;}
  var thCells=cols.map(function(a){
    return '<th style="padding:6px 8px;text-align:center;font-size:11px;font-weight:600;background:#fff8f0;color:#bf360c;white-space:nowrap;border:1px solid #ffe0b2">'+a.emoji+'<br>'+a.label+'</th>';
  }).join('');
  var trRows=rows.map(function(row){
    var tds=cols.map(function(a){
      var has=row.allergens.indexOf(a.id)>=0;
      return '<td style="padding:6px 8px;text-align:center;border:1px solid #eee;background:'+(has?'#fff3e0':'var(--white)')+'">'        +(has?'<span style="color:#e65100;font-size:16px;font-weight:700">●</span>':'<span style="color:#ddd;font-size:14px">–</span>')        +'</td>';
    }).join('');
    return '<tr><td style="padding:6px 10px;font-size:12px;font-weight:500;border:1px solid #eee;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis">'+row.name+'</td>'+tds+'</tr>';
  }).join('');
  var ex=document.getElementById('allergen-modal');if(ex)ex.remove();
  var ov=document.createElement('div');
  ov.id='allergen-modal';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2500;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto';
  ov.innerHTML=
    '<div style="background:var(--white);border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.4)">'
    +'<div style="background:#bf360c;color:white;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">'
    +'<div><div style="font-size:10px;opacity:0.8;margin-bottom:2px">🥜 アレルゲン早見表</div><div style="font-size:16px;font-weight:700">'+c.name+'</div></div>'
    +'<button id="allergen-close-btn" style="background:rgba(255,255,255,0.2);border:none;color:white;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer">✕</button>'
    +'</div>'
    +'<div style="overflow:auto;padding:14px">'
    +'<table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr>'
    +'<th style="padding:6px 10px;text-align:left;font-size:11px;background:var(--bg2);border:1px solid var(--border)">料理名</th>'
    +thCells
    +'</tr></thead>'
    +'<tbody>'+trRows+'</tbody>'
    +'</table>'
    +'<div style="margin-top:12px;font-size:11px;color:var(--text-muted)">● = 含む　– = 含まない（または未登録）</div>'
    +'</div>'
    +'</div>';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
  document.getElementById('allergen-close-btn').onclick=function(){ov.remove();};
}

async function deleteCourse(id){showConfirm('このコースを削除しますか？', async function(){ await dbDelete('courses',id); closeModal(); showPage('courses'); });}

function printCourse(id) {
  var c = DB.courses.find(function(x){ return x.id===id; });
  if(!c) return;

  var allergenLabels = {'egg':'卵','milk':'乳','wheat':'小麦','shrimp':'えび','crab':'かに','peanut':'落花生','soba':'そば','abalone':'あわび','squid':'いか','salmon':'いくら','orange':'オレンジ','cashew':'カシューナッツ','kiwi':'キウイ','beef':'牛肉','walnut':'くるみ','sesame':'ごま','mackerel':'さば','soy':'大豆','chicken':'鶏肉','banana':'バナナ','pork':'豚肉','matsutake':'まつたけ','peach':'もも','yam':'やまいも','apple':'りんご','gelatin':'ゼラチン'};

  // 全アレルゲン収集
  var allAllergens = new Set();
  (c.dishes||[]).forEach(function(d){
    var recipes = d.isPlate
      ? (d.elements||[]).map(function(e){return DB.recipes.find(function(r){return r.id===e.recipeId;});}).filter(Boolean)
      : [DB.recipes.find(function(r){return r.id===d.recipeId;})].filter(Boolean);
    recipes.forEach(function(r){ (r.allergens||[]).forEach(function(a){allAllergens.add(a);}); });
  });

  // 各ポジションのHTML生成
  var dishesHtml = (c.dishes||[]).map(function(d, idx){
    if(d.isPlate){
      var plateItems = (d.elements||[]).map(function(e){
        var r = DB.recipes.find(function(x){return x.id===e.recipeId;});
        var ing = !r&&e.ingredientId?DB.ingredients.find(function(x){return x.id===e.ingredientId;}):null;
        if(!r&&!ing) return '';
        var name = r?r.name:(ing?ing.name:'');
        var perStr = r&&r.perServing ? r.perServing+(r.perServingUnit||'')+'/人前' : (r&&r.servings>0?r.servings+'人分':'');
        return '<div style="font-size:11px;display:flex;align-items:baseline;gap:4px;padding:3px 0;border-bottom:1px solid #eee">'
          +'<span style="color:#2d4a30;flex-shrink:0">・</span>'
          +'<span style="font-weight:600">'+name+'</span>'
          +(e.amount?' <span style="color:#888;font-size:10px">'+e.amount+(e.unit||'')+'</span>':'')
          +(perStr?' <span style="color:#2d6a4f;font-size:10px">'+perStr+'</span>':'')
          +'</div>';
      }).filter(Boolean).join('');
      return '<div style="margin-bottom:14px;page-break-inside:avoid;border:1px solid #c8e6c9;border-radius:8px;overflow:hidden">'
        +'<div style="background:#2d4a30;color:white;padding:6px 12px;display:flex;align-items:center;gap:8px">'
        +(d.position?'<span style="background:rgba(255,255,255,0.2);padding:1px 8px;border-radius:8px;font-size:10px">'+d.position+'</span>':'')
        +'<span style="font-size:12px;font-weight:500">🍽 '+(d.plateName||'プレート')+'</span>'
        +'</div>'
        +'<div style="display:flex;gap:12px;padding:10px">'
        +(d.platePhoto
          ?'<img src="'+d.platePhoto+'" style="width:240px;height:200px;object-fit:contain;background:#f5f5f0;border-radius:8px;flex-shrink:0">'
          :'<div style="width:240px;height:200px;background:#f0f0eb;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px">🍽</div>')
        +'<div style="flex:1;min-width:0">'
        +plateItems
        +(d.platingMemo?'<div style="margin-top:8px;padding:5px 8px;background:#fffde7;border-left:3px solid #f9a825;border-radius:0 4px 4px 0;font-size:10px;color:#444">📝 '+d.platingMemo+'</div>':'')
        +'</div>'
        +'</div>'
        +'</div>';
    }
    var r = DB.recipes.find(function(x){return x.id===d.recipeId;});
    if(!r) return '';
    var perStr = r.perServing ? r.perServing+(r.perServingUnit||'')+'/人前' : (r.servings>0?r.servings+'人分':'');
    return '<div style="margin-bottom:14px;page-break-inside:avoid;border:1px solid #c8e6c9;border-radius:8px;overflow:hidden">'
      +'<div style="background:#2d4a30;color:white;padding:6px 12px;display:flex;align-items:center;gap:8px">'
      +(d.position?'<span style="background:rgba(255,255,255,0.2);padding:1px 8px;border-radius:8px;font-size:10px">'+d.position+'</span>':'')
      +'<span style="font-size:12px;font-weight:500">'+r.name+'</span>'
      +(d.amount?'<span style="font-size:10px;opacity:0.8">'+d.amount+(d.unit||'')+'</span>':'')
      +(perStr?'<span style="font-size:10px;opacity:0.7;margin-left:4px">1人前: '+perStr+'</span>':'')
      +'</div>'
      +'<div style="display:flex;gap:12px;padding:10px">'
      +(r.photo?'<img src="'+r.photo+'" style="width:240px;height:200px;object-fit:contain;background:#f5f5f0;border-radius:8px;flex-shrink:0">':'<div style="width:240px;height:160px;background:#f0f0eb;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px">🍳</div>')
      +'<div style="flex:1;min-width:0">'
      +(d.platingMemo?'<div style="padding:6px 8px;background:#fffde7;border-left:3px solid #f9a825;border-radius:0 4px 4px 0;font-size:11px;color:#444">📝 '+d.platingMemo+'</div>':'')
      +(r.notes&&!d.platingMemo?'<div style="font-size:10px;color:#666;padding:4px 0">'+r.notes+'</div>':'')
      +'</div>'
      +'</div>'
      +'</div>';
  }).filter(Boolean).join('');

  var allergenBadges = allAllergens.size > 0
    ? Array.from(allAllergens).map(function(a){return '<span style="background:#ffe0b2;color:#bf360c;border-radius:4px;padding:1px 6px;font-size:10px;margin:2px;display:inline-block">'+(allergenLabels[a]||a)+'</span>';}).join('')
    : '<span style="color:#888;font-size:11px">なし</span>';

  var printHtml = '<!DOCTYPE html><html><head><meta charset="utf-8">'
    +'<title>'+c.name+' 盛り付けシート</title>'
    +'<style>'
    +'@page{size:A4 portrait;margin:12mm 10mm}'
    +'*{box-sizing:border-box}'
    +'body{font-family:"Noto Sans JP",Hiragino Sans,sans-serif;color:#333;margin:0;padding:0;font-size:11px;line-height:1.5}'
    +'@media print{body{margin:0}*{-webkit-print-color-adjust:exact;print-color-adjust:exact}}'
    +'</style></head><body>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #2d4a30;padding-bottom:8px;margin-bottom:10px">'
    +'<div>'
    +'<div style="font-size:9px;letter-spacing:.2em;color:#2d6a4f">WASSA WASSA 盛り付けシート</div>'
    +'<div style="font-size:20px;font-weight:700">'+c.name+'</div>'
    +'<div style="font-size:10px;color:#888">'+(c.dishes?c.dishes.length:0)+'品構成</div>'
    +'</div>'
    +'<div style="font-size:10px;color:#aaa;text-align:right">'+new Date().toLocaleDateString('ja-JP')+'</div>'
    +'</div>'
    +(allAllergens.size>0?'<div style="background:#fff8f0;border:1px solid #ffcc80;border-radius:6px;padding:6px 10px;margin-bottom:10px;font-size:10px"><span style="font-weight:700;color:#bf360c">⚠️ アレルゲン: </span>'+allergenBadges+'</div>':'')
    +dishesHtml
    +'</body></html>';

  var w = window.open('', '_blank');
  w.document.write(printHtml);
  w.document.close();
  w.onload = function(){ w.print(); };
}

// ========== INGREDIENTS ==========
function renderIngredients() {
  document.getElementById('topbar-actions').innerHTML=
    isStaffMode?'':'<button class="btn btn-primary" onclick="openIngredientForm()">＋ 食材を追加</button>';
  const cats=[...new Set(DB.ingredients.map(i=>i.category).filter(Boolean))];
  document.getElementById('content').innerHTML=`
    <div class="search-bar">
      <div class="search-input-wrap"><span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span><input type="text" id="ing-search" placeholder="食材名で検索..." oninput="renderIngTable()"></div>
      <select class="filter-select" id="ing-cat-filter" onchange="renderIngTable()"><option value="">カテゴリ 全て</option>${cats.map(c=>'<option value="'+c+'">'+c+'</option>').join('')}</select>
    </div>
    <div class="card"><div class="table-wrap" id="ing-table"></div></div>`;
  renderIngTable();
}

function renderIngTable(){
  const q=(document.getElementById('ing-search')?.value||'').toLowerCase();
  const cat=document.getElementById('ing-cat-filter')?.value||'';
  var allFiltered=DB.ingredients.filter(i=>(!q||i.name.toLowerCase().includes(q))&&(!cat||i.category===cat));
  var CU=WEIGHT_VOL_UNITS;
  var filtered=allFiltered.slice().sort(function(a,b){
    var aI=(!a.unitPrice||parseFloat(a.unitPrice||0)<=0)?2:(isCountUnit(a.unit)&&!(a.unitConversions||[]).some(function(uc){return uc.unit===a.unit&&uc.amount>0;}))?1:0;
    var bI=(!b.unitPrice||parseFloat(b.unitPrice||0)<=0)?2:(isCountUnit(b.unit)&&!(b.unitConversions||[]).some(function(uc){return uc.unit===b.unit&&uc.amount>0;}))?1:0;
    return bI-aI;
  });
  const el=document.getElementById('ing-table');if(!el)return;
  if(!filtered.length){el.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🥬</div><h3>食材がありません</h3><p>食材を追加してください</p></div>`;return;}
  el.innerHTML='<table><thead><tr><th>食材名</th><th class="ing-col-cat">カテゴリ</th><th>単位</th><th class="td-num">税込単価</th><th class="ing-col-supplier">仕入先</th><th></th></tr></thead><tbody>'
    +filtered.map(function(i){
      var excl=i.taxType==='incl'?taxExcl(i.unitPrice):i.unitPrice;
      var incl=i.taxType==='incl'?i.unitPrice:taxIncl(i.unitPrice);
      var noPrice = !i.unitPrice || parseFloat(i.unitPrice||0) <= 0;
      var isCountU = isCountUnit(i.unit);
      var noGConv = isCountU && !(i.unitConversions||[]).some(function(uc){ return ['g','グラム','ml','cc'].includes(uc.unit) && uc.amount>0; });
      var noNutrition = !i.kcal && !i.protein && !i.fat && !i.carbs;
      var hasIssue = noPrice || noGConv || noNutrition;
      var rowBg = noPrice ? 'background:#fff5f5;border-left:3px solid #e74c3c;' : (noGConv ? 'background:#fff8f0;border-left:3px solid #f0a500;' : (noNutrition ? 'background:#fffef0;border-left:3px solid #d4b800;' : ''));
            return '<tr style="'+rowBg+'">'
        +'<td>'
          +'<strong style="color:'+(noPrice?'#c0392b':(noGConv?'#c07000':(noNutrition?'#9a8400':'inherit')))+'">'+i.name+'</strong>'
          +(noPrice?'<span style="font-size:10px;background:#e74c3c;color:#fff;border-radius:3px;padding:1px 4px;margin-left:4px">単価未登録</span>':'')
          +(noGConv?'<span style="font-size:10px;background:#f0a500;color:#fff;border-radius:3px;padding:1px 4px;margin-left:4px">g換算未登録</span>':'')
          +(i.hideFromRecipe?'<span style="font-size:10px;color:var(--text-muted);margin-left:4px">🚫非表示</span>':'')
        +'</td>'
        +'<td class="ing-col-cat" style="font-size:12px">'+(i.category||'-')+'</td>'
        +'<td style="font-size:12px">'+i.unit+'</td>'
        +'<td class="td-num">'+(incl>0?formatYen(incl)+'<span style="font-size:10px;color:var(--text-muted)">/'+i.unit+'</span>':'<span style="color:#ccc">未登録</span>')+'</td>'
        +'<td class="ing-col-supplier" style="font-size:12px;color:var(--text-muted)">'+(i.supplier||'-')+'</td>'
        +'<td style="white-space:nowrap">'
          +(isStaffMode?'':
            '<button class="btn btn-secondary btn-sm" onclick="openIngredientForm(\''+i.id+'\')">✏️</button> '
          +'<button class="btn btn-danger btn-sm" onclick="deleteIngredient(\''+i.id+'\')">🗑</button>')
        +'</td>'
        +'</tr>';
    }).join('')
  +'</tbody></table>';
}

function getSupplierOptions(){
  var suppliers=[...new Set(
    DB.ingredients
      .map(function(i){return (i.supplier||'').trim();})
      .filter(function(s){return s.length>0;})
  )].sort();
  return suppliers.map(function(s){return '<option value="'+s+'">';}).join('');
}

function filterIngredients(){
  var q=(document.getElementById('ing-search')||{value:''}).value.toLowerCase().trim();
  document.querySelectorAll('.ingredient-row').forEach(function(row){
    var name=(row.dataset.name||'').toLowerCase();
    var cat=(row.dataset.cat||'').toLowerCase();
    row.style.display=(!q||name.includes(q)||cat.includes(q))?'':'none';
  });
  document.querySelectorAll('.ing-cat-header').forEach(function(hdr){
    var next=hdr.nextElementSibling;
    var hasVisible=false;
    while(next&&!next.classList.contains('ing-cat-header')){
      if(next.style.display!=='none') hasVisible=true;
      next=next.nextElementSibling;
    }
    hdr.style.display=hasVisible?'':'none';
  });
}

function showIngSuggestForIngForm(inputEl){
  var q=inputEl.value.trim();
  if(!q||q.length<1){hideIngSuggest();return;}
  // 編集中の食材自身を除く全食材
  var pool=DB.ingredients.filter(function(i){return i.id!==(editingIngredientId||'');});
  showIngSuggest(inputEl, q, pool, function(item){
    if(confirm('「'+item.name+'」に変更しますか？\nレシピでこの食材を使用している場合は自動的に置き換わります。')){
      // 食材名・単位を置き換えてフォームを再表示
      closeModal();
      setTimeout(function(){openIngredientForm(item.id);},100);
    }
  });
}

async function fetchUnitConversions(){
  if(!DB.settings.anthropicKey){alert('APIキーが設定されていません');return;}
  var name=document.getElementById('if-name')?document.getElementById('if-name').value.trim():'';
  var unit=document.getElementById('if-unit')?document.getElementById('if-unit').value.trim():'';
  if(!name||!unit){alert('先に食材名と単位を入力してください');return;}
  var el=document.getElementById('if-unit-conv-result');
  if(el) el.textContent='⏳ AIが換算値を取得中...';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':DB.settings.anthropicKey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:'「'+name+'」の単位換算を教えてください。基本単位は「'+unit+'」です。'
          +'以下の形式でJSONのみ回答してください（説明不要、コードブロック不要）。'
          +'形式: [{"unit":"大さじ","amount":15},{"unit":"小さじ","amount":5}]'
          +'重要ルール:'
          +'1. unitは純粋な単位名のみ（数字を含めない）。例: "100g"はNG、"g"が正しい。'
          +'2. amountは「1 [unit] = amount [基本単位'+unit+']」の数値のみ（純粋な数字）。'
          +'3. 絶対に逆数にしないこと。1大さじ=15'+unit+'なら amount:15、amount:0.067は間違い。'
          +'4. 基本単位が「g」の場合: 1本=100gなら {"unit":"本","amount":100} と {"unit":"kg","amount":1000} を必ず両方含めること。'
          +'5. 基本単位が「個」「本」「玉」「束」「袋」「pc」「片」「節」「丁」「枚」「切れ」「株」「パック」等の場合はg換算とkg換算を必ず両方含めること。例: 1個=200gなら {"unit":"g","amount":200} と {"unit":"kg","amount":0.2} の両方。'
          +'6. 同じ量を表す単位（ml/cc, L/リットル等）も含めること。'}]
      })
    });
    var data=await res.json();
    var text=(data.content&&data.content[0]&&data.content[0].text)||'';
    var clean=text.replace(/```json|```/g,'').trim();
    var start=clean.indexOf('[');
    if(start>=0) clean=clean.slice(start);
    var list=JSON.parse(clean);
    // 結果を正規化（unitに数字が混入していたら分離、amountがおかしければ修正）
    var normalized=[];
    list.forEach(function(item){
      var u=(item.unit||'').trim();
      var a=parseFloat(item.amount)||0;
      if(a<=0) return;
      // unitに数字・分数が混入している場合を除去（例:"100g"→"g", "1個"→"個", "1/2枚"→"枚"）
      // パターン1: "100g" 数字+単位 → unit="g", amount=100
      var m=u.match(/^([0-9.]+)\s*([a-zA-Zぁ-ん一-龯ー]+)$/);
      if(m){ var numPart=parseFloat(m[1]); var unitPart=m[2]; if(numPart>0){ u=unitPart; a=numPart; } }
      // パターン2: "1個" "2本" "1/2枚" など先頭に数字/分数がある場合 → 単位部分のみ残す
      if(!m){
        var m2=u.match(/^[0-9][0-9./]*\s*([^0-9./].*)$/);
        if(m2){ u=m2[1].trim(); }
      }
      // 基本単位と同じ単位は追加しない（g/kgは例外として許可）
      if(u === unit && u !== 'g' && u !== 'kg') return;
      // 重複除去
      if(!normalized.some(function(x){return x.unit===u;})){
        normalized.push({unit:u,amount:a});
      }
    });
    // g と kg の整合性チェック（どちらかから正しい値を計算）
    var gItem  = normalized.find(function(x){return x.unit==='g';});
    var kgItem = normalized.find(function(x){return x.unit==='kg';});
    if(gItem && kgItem){
      // 両方ある場合：gを正としてkgを修正
      kgItem.amount = Math.round(gItem.amount / 1000 * 10000) / 10000;
    } else if(gItem && !kgItem){
      // gだけある場合：kgを自動追加
      normalized.push({unit:'kg', amount:Math.round(gItem.amount / 1000 * 10000) / 10000});
    } else if(kgItem && !gItem){
      // kgだけある場合：gを自動追加
      normalized.push({unit:'g', amount:Math.round(kgItem.amount * 1000)});
    }
    // 既存の換算行をクリア
    var convList=document.getElementById('if-unit-conv-list');
    if(convList) convList.innerHTML='';
    normalized.forEach(function(item){addUnitConvRow(item.unit,item.amount);});
    if(el) el.textContent='✅ '+normalized.length+'件の換算値を取得しました';
  }catch(e){
    if(el) el.textContent='エラー: '+e.message;
  }
}

function getUnitConversions(){
  var rows=document.querySelectorAll('.uc-row');
  var result=[];
  rows.forEach(function(row){
    var u=row.querySelector('.uc-unit');
    var a=row.querySelector('.uc-amount');
    var q=row.querySelector('.uc-qty');
    var qty=q?parseFloat(q.value)||1:1;
    if(u&&a&&u.value.trim()&&parseFloat(a.value)>0){
      // qty単位=amount → 1単位=amount/qtyに変換して保存
      result.push({unit:u.value.trim(),amount:Math.round(parseFloat(a.value)/qty*10000)/10000});
    }
  });
  return result;
}

async function saveIngredient(id){
  var name=document.getElementById('if-name').value.trim();
  var unit=document.getElementById('if-unit').value.trim();
  if(!name||!unit){alert('食材名と単位は必須です');return;}
  var duplicate=DB.ingredients.find(function(i){return i.name===name&&i.id!==(id||'');});
  if(duplicate){if(!confirm('「'+name+'」はすでに登録されています。\n上書き更新しますか？'))return;}
  var taxType=document.getElementById('if-taxtype').value;
  var buyQty=parseFloat(document.getElementById('if-buy-qty').value||0)||undefined;
  var buyPrice=parseFloat(document.getElementById('if-buy-price').value||0)||undefined;
  var buyUnit=document.getElementById('if-buy-unit').value.trim()||unit;
  var unitPrice;
  if(buyQty>0 && buyPrice>0){
    var rawBuyPrice=taxType==='incl'?taxExcl(buyPrice):buyPrice;
    unitPrice=rawBuyPrice/buyQty;
  } else {
    var priceVal=document.getElementById('if-price').value;
    var rawPrice=priceVal!==''?parseFloat(priceVal):undefined;
    unitPrice=rawPrice!==undefined?(taxType==='incl'?taxExcl(rawPrice):rawPrice):undefined;
  }
  var stockVal='';  // 在庫数は棚卸しページのみで管理
  var ingAllergens=[...document.querySelectorAll('.if-allergen-cb:checked')].map(function(cb){return cb.value;});
  var ingDietFlags=[...document.querySelectorAll('.if-diet-cb:checked')].map(function(cb){return cb.value;});
  var data={id:id||genId(),name:name,unit:unit,
    category:document.getElementById('if-category').value,
    unitPrice:unitPrice,taxType:taxType,
    buyQty:buyQty,buyPrice:buyPrice,buyUnit:buyUnit,
    stock:stockVal!==''?parseFloat(stockVal):undefined,
    supplier:document.getElementById('if-supplier').value,
    productName:document.getElementById('if-product-name').value,
    allergens:ingAllergens,
    dietFlags:ingDietFlags,
    hideFromRecipe:document.getElementById('if-hide-from-recipe').checked,
    unitConversions:(function(){
      var convs = getUnitConversions();
      // g換算クイック入力の値をマージ
      var gConvEl = document.getElementById('if-g-conv');
      var gConvVal = gConvEl ? parseFloat(gConvEl.value) : NaN;
      if(!isNaN(gConvVal) && gConvVal >= 0 && isCountUnit(unit)){
        // 既存のunit→g換算を削除して新しい値で上書き
        convs = convs.filter(function(uc){ return uc.unit !== unit; });
        convs.unshift({unit: unit, amount: gConvVal});
        if(gConvVal > 0){
          // kg換算も自動計算して追加（既存のkgは上書き）
          var kgVal = Math.round(gConvVal / 1000 * 10000) / 10000;
          convs = convs.filter(function(uc){ return uc.unit !== 'kg'; });
          convs.push({unit:'kg', amount:kgVal});
          // g換算も念のため追加
          convs = convs.filter(function(uc){ return uc.unit !== 'g'; });
          convs.push({unit:'g', amount:gConvVal});
        }
      }
      return convs;
    })(),
    note:document.getElementById('if-note').value};
  await dbUpsert('ingredients',data);
  if(typeof window._afterIngredientSave==='function'){
    var cb=window._afterIngredientSave;
    window._afterIngredientSave=null;
    closeModal();
    cb(data);
  } else {
    closeModal(); renderIngredients();
  }
}

async function calcBulkUnitPrice(input){
  var row=input.closest('.bulk-row');
  if(!row) return;
  var qty=parseFloat(row.querySelector('.bulk-qty').value||0);
  var price=parseFloat(row.querySelector('.bulk-price').value||0);
  var taxtype=row.querySelector('.bulk-taxtype').value;
  var unitPriceEl=row.querySelector('.bulk-unit-price');
  if(qty>0&&price>0){
    var rawPrice=taxtype==='incl'?taxExcl(price):price;
    var up=rawPrice/qty;
    unitPriceEl.textContent=formatYen(up)+'/'+row.querySelector('.bulk-buy-unit').value;
    unitPriceEl.style.color='var(--accent-dark)';
  } else {
    unitPriceEl.textContent='-';
  }
}

async function saveBulkPrice(){
  var saved=0;
  var rows=document.querySelectorAll('.bulk-row');
  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri];
    var qty=parseFloat(row.querySelector('.bulk-qty').value||0);
    var price=parseFloat(row.querySelector('.bulk-price').value||0);
    var buyUnit=row.querySelector('.bulk-buy-unit').value.trim();
    var taxtype=row.querySelector('.bulk-taxtype').value;
    if(qty<=0||price<=0) continue;
    var ingId=row.dataset.id;
    var ing=DB.ingredients.find(function(i){return i.id===ingId;});
    if(!ing) continue;
    var rawPrice=taxtype==='incl'?taxExcl(price):price;
    ing.unitPrice=rawPrice/qty;
    ing.buyQty=qty;
    ing.buyPrice=price;
    ing.buyUnit=buyUnit;
    ing.taxType=taxtype;
    await dbUpsert('ingredients',ing);
    saved++;
  }
  if(saved>0){
    alert('✅ '+saved+'件の単価を保存しました！');
    renderBulkPrice();
  } else {
    alert('保存する単価がありません。購入数量と購入価格を入力してください。');
  }
}

// ========== EXCEL BACKUP ==========
function exportAllDataExcel(){
  if(typeof XLSX==='undefined'){alert('少々お待ちください');return;}
  var wb=XLSX.utils.book_new();
  var ingHeader=['食材名','カテゴリ','単位','税抜単価','税込単価','購入数量','購入単位','購入価格','仕入先','商品名','メモ'];
  var ingRows=DB.ingredients.map(function(i){
    return [i.name,i.category||'',i.unit,
      Math.round((i.unitPrice||0)*1000)/1000,
      Math.round(taxIncl(i.unitPrice||0)*1000)/1000,
      i.buyQty||'',i.buyUnit||'',i.buyPrice||'',
      i.supplier||'',i.productName||'',i.note||''];
  });
  var wsIng=XLSX.utils.aoa_to_sheet([ingHeader].concat(ingRows));
  wsIng['!cols']=[14,10,6,10,10,8,8,10,14,16,16].map(function(w){return{wch:w};});
  XLSX.utils.book_append_sheet(wb,wsIng,'食材');
  var recHeader=['料理名','カテゴリ','人数','説明','食材','手順','メモ','タグ'];
  var recRows=DB.recipes.map(function(r){
    var ings=(r.ingredients||[]).map(function(ri){
      var ing=DB.ingredients.find(function(i){return i.id===ri.ingredientId;});
      return (ing?ing.name:'不明')+':'+ri.amount+':'+(ri.unit||'');
    }).join(' / ');
    return [r.name,r.category||'',r.servings||1,r.description||'',ings,(r.steps||[]).join(' → '),r.notes||'',(r.tags||[]).join(', ')];
  });
  var wsRec=XLSX.utils.aoa_to_sheet([recHeader].concat(recRows));
  wsRec['!cols']=[16,10,6,20,40,40,16,12].map(function(w){return{wch:w};});
  XLSX.utils.book_append_sheet(wb,wsRec,'レシピ');
  var crsHeader=['コース名','カテゴリ','説明','構成'];
  var crsRows=DB.courses.map(function(c){
    var dishes=(c.dishes||[]).map(function(d){
      var r=DB.recipes.find(function(x){return x.id===d.recipeId;});
      return (d.position||'')+':'+(r?r.name:'');
    }).join(' / ');
    return [c.name,c.courseCategory||'',c.description||'',dishes];
  });
  var wrsCrs=XLSX.utils.aoa_to_sheet([crsHeader].concat(crsRows));
  wrsCrs['!cols']=[16,14,20,40].map(function(w){return{wch:w};});
  XLSX.utils.book_append_sheet(wb,wrsCrs,'コース');
  XLSX.writeFile(wb,'WASSAWASSA_backup_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

function exportRecipeExcel(id){
  if(typeof XLSX==='undefined'){alert('少々お待ちください');return;}
  var r=id?DB.recipes.find(function(x){return x.id===id;}):null;
  var recipes=r?[r]:DB.recipes;
  var wb=XLSX.utils.book_new();
  recipes.forEach(function(recipe){
    var nutrition=calcRecipeNutrition(recipe);
    var dietInfo=calcDietInfo(recipe.ingredients||[]);
    var cost=calcRecipeCost(recipe);
    var data=[];
    data.push([recipe.name]);
    data.push(['']);
    if(recipe.description) data.push([recipe.description]);
    data.push([(recipe.servings||1)+'人分'+(recipe.category?' | '+recipe.category:'')+(cost>0?' | 原価'+Math.round(cost)+'円':'')]);
    if(dietInfo&&dietInfo.length) data.push([dietInfo.map(function(d){return d.label;}).join(' / ')]);
    data.push(['']);
    data.push(['材料','','量','単位','原価']);
    (recipe.ingredients||[]).forEach(function(ri){
      var ing=DB.ingredients.find(function(i){return i.id===ri.ingredientId;});
      var c=ing&&ing.unitPrice?Math.round(parseFloat(ing.unitPrice)*parseFloat(ri.amount||0)):0;
      data.push(['',(ing?ing.name:'不明'),ri.amount,ri.unit||'',c>0?c:'']);
    });
    data.push(['']);
    data.push(['作り方']);
    (recipe.steps||[]).forEach(function(s,i){data.push([i+1,s]);});
    if(recipe.notes){data.push(['']);data.push(['メモ']);data.push(['',recipe.notes]);}
    if(nutrition.kcal>0){
      data.push(['']);
      data.push(['栄養素','カロリー','タンパク質','脂質','炭水化物','塩分']);
      data.push(['合計',Math.round(nutrition.kcal)+'kcal',Math.round(nutrition.protein*10)/10+'g',Math.round(nutrition.fat*10)/10+'g',Math.round(nutrition.carbs*10)/10+'g',Math.round(nutrition.salt*10)/10+'g']);
      if((recipe.servings||1)>1) data.push(['1人分',Math.round(nutrition.kcal/recipe.servings)+'kcal',Math.round(nutrition.protein/recipe.servings*10)/10+'g',Math.round(nutrition.fat/recipe.servings*10)/10+'g',Math.round(nutrition.carbs/recipe.servings*10)/10+'g',Math.round(nutrition.salt/recipe.servings*10)/10+'g']);
    }
    var ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[4,22,8,8,8,8].map(function(w){return{wch:w};});
    ws['!pageSetup']={paperSize:9,orientation:'portrait',fitToPage:true,fitToWidth:1,fitToHeight:0};
    ws['!margins']={left:0.5,right:0.5,top:0.75,bottom:0.75,header:0.3,footer:0.3};
    XLSX.utils.book_append_sheet(wb,ws,recipe.name.slice(0,31));
  });
  var fname=r?r.name.slice(0,20):'全レシピ';
  XLSX.writeFile(wb,'WASSAWASSA_レシピ_'+fname+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

function renderInventoryTable(){

  var searchQ=(document.getElementById('inv-search')?document.getElementById('inv-search').value:'').toLowerCase();
  var items=DB.ingredients.filter(function(i){
    if(cat && (i.category||'')!==cat) return false;
    if(stockOnly && (i.stock||0)<=0) return false;
    if(searchQ && !searchMatch(i.name, searchQ)) return false;
    return true;
  });
  var total=items.reduce(function(s,i){return s+(i.stock||0)*taxIncl(i.unitPrice);},0);
  var el=document.getElementById('inv-table-wrap');

  var today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

async function updateStock(id,val,refreshTable){
  const ing=DB.ingredients.find(i=>i.id===id);
  if(ing){
    ing.stock=parseFloat(val)||0;
    await dbUpsert('ingredients',ing);
    if(refreshTable) renderInventoryTable();
    else {
      const total=DB.ingredients.reduce((s,i)=>s+(i.stock||0)*i.unitPrice,0);
      const el=document.getElementById('inv-total');
      if(el)el.textContent=formatYen(total);
    }
  }
}

async function saveInventorySnapshot(){
  const items = DB.ingredients
    .filter(i=>(i.stock||0)>0)
    .map(i=>({
      id:i.id, name:i.name, category:i.category||'',
      unit:i.unit, unitPrice:i.unitPrice,
      unitPriceTaxIncl:Math.round(taxIncl(i.unitPrice)),
      stock:i.stock||0,
      stockValue:Math.round((i.stock||0)*i.unitPrice),
      stockValueTaxIncl:Math.round((i.stock||0)*taxIncl(i.unitPrice)),
      supplier:i.supplier||''
    }));
  const totalExcl = items.reduce((s,i)=>s+i.stockValue,0);
  const totalIncl = items.reduce((s,i)=>s+i.stockValueTaxIncl,0);

async function importFromUrl(){
  window._importPhotoDataUrl=null; // URL取り込み時は写真なし
  var urlEl=document.getElementById('import-url');
  var url=urlEl?urlEl.value.trim():''; if(!url) return;
  var el=document.getElementById('import-result');
  el.innerHTML='<div style="padding:18px;text-align:center"><div class="loading-spinner"></div> URLを取得中...</div>';
  // 複数プロキシを順番に試す（レスポンス形式が異なるため個別処理）
  var text='';

  // Proxy 1: allorigins.win
  if(!text){
    try{
      var r1=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)});
      if(r1.ok){
        var d1=await r1.json();
        var raw1=d1.contents||'';
        if(typeof raw1==='string' && raw1.length>200)
          text=extractText(raw1);
      }
    }catch(e){}
  }

  // Proxy 2: corsproxy.io（テキストを直接返す）
  if(!text){
    try{
      var r2=await fetch('https://corsproxy.io/?'+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)});
      if(r2.ok){
        var raw2=await r2.text();
        if(raw2.length>200) text=extractText(raw2);
      }
    }catch(e){}
  }

  // Proxy 3: allorigins raw
  if(!text){
    try{
      var r3=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)});
      if(r3.ok){
        var raw3=await r3.text();
        if(raw3.length>200) text=extractText(raw3);
      }
    }catch(e){}
  }

  if(text && text.length>100){
    await parseRecipeWithAI(text.slice(0,12000));
  } else {
    el.innerHTML='<div style="padding:12px;background:#fff3cd;border-radius:8px;font-size:13px">'
      +'⚠️ URLから取得できませんでした（クックパッド・インスタは取得不可）。<br><br>'
      +'<strong>代替方法：</strong><br>'
      +'① レシピページをブラウザで開く<br>'
      +'② テキストを全選択してコピー（Ctrl+A → Ctrl+C）<br>'
      +'③「テキスト」タブに貼り付けて解析</div>';
  }
}

function extractText(html){
  return html
    .replace(/<scr'+'ipt[\s\S]*?<\/scr'+'ipt>/gi,'')
    .replace(/<style[\s\S]*?<\/style>/gi,'')
    .replace(/<[^>]+>/g,' ')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,' ')
    .replace(/\s+/g,' ').trim();
}
async function importFromPhoto(input){
  var file=input.files[0]; if(!file) return;
  var el=document.getElementById('import-result');
  if(!DB.settings.anthropicKey){
    el.innerHTML='<div style="padding:10px;background:#fff3cd;border-radius:8px;font-size:13px">設定ページでAPIキーを入力してください。</div>';
    return;
  }
  var isHeic=file.type==='image/heic'||file.type==='image/heif'
    ||file.name.toLowerCase().endsWith('.heic')||file.name.toLowerCase().endsWith('.heif');
  el.innerHTML='<div style="padding:18px;text-align:center"><div class="loading-spinner"></div> 画像を処理中...</div>';
  window._importPhotoDataUrl=null; // 初期化

  function sendToAPI(b64){
    // 必ず保存してからAPI送信
    window._importPhotoDataUrl=null; // 解析用画像はレシピ写真に使わない
    if(b64.length>6600000){
      el.innerHTML='<div style="padding:10px;background:#f8d7da;border-radius:8px;font-size:13px">画像が大きすぎます。より小さい画像を使用してください。</div>';
      return;
    }
    el.innerHTML='<div style="padding:18px;text-align:center"><div class="loading-spinner"></div> 写真を解析中...</div>';
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':DB.settings.anthropicKey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
          ({type:'text',text:'この料理レシピ画像から情報を抽出し、必ず日本語でJSONのみで回答してください（説明文・マークダウン不要）。amountは数値のみ、unitは単位文字列のみで分けてください。categoryは必ず次のリストから最も近いものを1つ選んでください: '+RECIPE_CATEGORIES().join('・')+'。tagsには料理の国・地域（例:タイ、イタリア、沖縄など）や特徴を配列で入れてください。形式: {"name":"料理名","description":"説明","servings":4,"category":"カテゴリ","tags":["国名"],"ingredients":[{"name":"食材名","amount":150,"unit":"g"}],"steps":["手順1"],"notes":"メモ"}。ingredientsにセクション区切り行を入れる場合は{\"_isSection\":true,\"_sectionLabel\":\"【セクション名】\"}の形式を使ってください'})
        ]}]
      })
    }).then(function(r){return r.json();}).then(function(data){
      if(data.error){el.innerHTML='<div style="padding:10px;background:#f8d7da;border-radius:8px;font-size:13px">APIエラー: '+data.error.message+'</div>';return;}
      var t=(data.content&&data.content[0]&&data.content[0].text)||'';
      if(!t){el.innerHTML='<div style="padding:10px;background:#f8d7da;border-radius:8px;font-size:13px">応答が空でした。再試行してください。</div>';return;}
      processImportResult(t);
    }).catch(function(err){
      el.innerHTML='<div style="padding:10px;background:#f8d7da;border-radius:8px;font-size:13px">通信エラー: '+err.message+'</div>';
    });
  }

  // Canvas経由でリサイズ＆JPEG圧縮
  function resizeAndCompress(imgEl, cb){
    var MAX_PX=1568;
    var w=imgEl.naturalWidth||imgEl.width||1024;
    var h=imgEl.naturalHeight||imgEl.height||1024;
    if(w>h){if(w>MAX_PX){h=Math.round(h*MAX_PX/w);w=MAX_PX;}}
    else{if(h>MAX_PX){w=Math.round(w*MAX_PX/h);h=MAX_PX;}}
    var canvas=document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    var ctx=canvas.getContext('2d');
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,w,h);
    ctx.drawImage(imgEl,0,0,w,h);
    var MAX_B64=5000000, quality=0.82, jpeg='';
    do{jpeg=canvas.toDataURL('image/jpeg',quality);quality=Math.round((quality-0.08)*100)/100;}
    while(jpeg.length>MAX_B64&&quality>0.1);
    cb(jpeg.split(',')[1]);
  }

  function showHeicGuide(){
    el.innerHTML='<div style="padding:14px;background:#fff3cd;border-radius:8px;font-size:13px;line-height:1.8">'
      +'⚠️ HEICファイルはこのブラウザで変換できませんでした。<br><br>'
      +'<strong>📱 解決方法</strong><br><br>'
      +'<strong>① iPhoneの設定を変更（推奨）</strong><br>'
      +'設定 → カメラ → フォーマット →「互換性優先」に変更<br><br>'
      +'<strong>② スクリーンショット（PNG）を撮って再アップロード</strong></div>';
  }

  var reader=new FileReader();
  reader.onload=function(e){
    var dataUrl=e.target.result;
    if(isHeic){
      if(typeof createImageBitmap!=='undefined'){
        createImageBitmap(file).then(function(bitmap){
          var tmpCanvas=document.createElement('canvas');
          tmpCanvas.width=bitmap.width; tmpCanvas.height=bitmap.height;
          tmpCanvas.getContext('2d').drawImage(bitmap,0,0);
          var px=tmpCanvas.getContext('2d').getImageData(0,0,Math.min(bitmap.width,50),Math.min(bitmap.height,50)).data;
          var br=0; for(var bi=0;bi<px.length;bi+=4) br+=px[bi]+px[bi+1]+px[bi+2];
          if(br/(px.length/4*3)<5){showHeicGuide();return;}
          var tmpImg=new Image();
          tmpImg.onload=function(){
            document.getElementById('import-photo-preview').innerHTML='<img src="'+tmpImg.src+'" style="max-width:100%;border-radius:8px;max-height:180px;object-fit:contain;margin-bottom:10px">';
            resizeAndCompress(tmpImg,sendToAPI);
          };
          tmpImg.src=tmpCanvas.toDataURL('image/jpeg',0.95);
        }).catch(showHeicGuide);
      } else { showHeicGuide(); }
    } else {
      var img=new Image();
      img.onload=function(){
        document.getElementById('import-photo-preview').innerHTML='<img src="'+dataUrl+'" style="max-width:100%;border-radius:8px;max-height:180px;object-fit:contain;margin-bottom:10px">';
        resizeAndCompress(img,sendToAPI);
      };
      img.onerror=function(){el.innerHTML='<div style="padding:10px;background:#f8d7da;border-radius:8px;font-size:13px">画像の読み込みに失敗しました。</div>';};
      img.src=dataUrl;
    }
  };
  reader.readAsDataURL(file);
}

    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':DB.settings.anthropicKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8192,messages:[{role:'user',content:prompt}]})
    });
    var data=await resp.json();
    if(data.error){
      el.innerHTML='<div style="padding:10px;background:#f8d7da;border-radius:8px;font-size:13px">APIエラー: '+data.error.message+'</div>';
      return;

    if(!rawText){
      el.innerHTML='<div style="padding:10px;background:#f8d7da;border-radius:8px;font-size:13px">AIからの応答が空でした。再試行してください。</div>';
      return;
    }
    processImportResult(rawText);
  }catch(e){
    el.innerHTML='<div style="padding:10px;background:#f8d7da;border-radius:8px;font-size:13px">通信エラー: '+e.message+'</div>';
  }
}

// 途中で切れたJSONを修復する
function repairJson(str){
  var s=str;
  s=s.replace(/,\s*"[^"]*"\s*:\s*[^,}\]]*$/,'')
     .replace(/,\s*"[^"]*"\s*:\s*$/,'')
     .replace(/,\s*"[^"]*"\s*$/,'')
     .replace(/,\s*\{[^}]*$/,'')
     .replace(/,\s*$/,'')
     .trimEnd();
  var opens=[];
  var inStr=false, esc=false;
  for(var i=0;i<s.length;i++){
    var c=s[i];
    if(esc){esc=false;continue;}
    if(c==='\\'){esc=true;continue;}
    if(c==='"'){inStr=!inStr;continue;}
    if(inStr) continue;
    if(c==='{') opens.push('}');
    else if(c==='[') opens.push(']');
    else if(c==='}'||c===']') opens.pop();
  }
  for(var j=opens.length-1;j>=0;j--) s+=opens[j];
  return s;
}

async function saveImportedRecipe(recipe){
  try{
    var newRecipe={
      id:genId(), name:recipe.name||'取り込みレシピ',
      description:recipe.description||'', category:recipe.category||'',
      servings:recipe.servings||1, steps:recipe.steps||[],
      notes:recipe.notes||'', ingredients:[], tags:['取り込み', ...(recipe.tags||[]).filter(t=>t&&t!=='取り込み')],
      favorite:false, allergens:[], coursePosition:'',
      photo:recipe.photo||window._importPhotoDataUrl||''
    };
    window._importPhotoDataUrl=null; // 使用後クリア
    var autoAdded=[];
    if(recipe.ingredients && recipe.ingredients.length){
      for(var ii=0;ii<recipe.ingredients.length;ii++){
        var ri=recipe.ingredients[ii];
        if(!ri) continue;
        // セクション行はそのまま保存
        if(ri._isSection){
          newRecipe.ingredients.push({id:genId(),_isSection:true,_sectionLabel:ri._sectionLabel||'',ingredientId:'',amount:'',unit:''});
          continue;
        }
        if(!ri.name) continue;
        var riName=String(ri.name).trim();
        if(!riName) continue;
        var matched=null;
        // 0. 取り込み画面でユーザーが選択した食材IDを最優先
        if(ri._matchedId){
          matched=DB.ingredients.find(function(g){return g.id===ri._matchedId;})||null;
        }
        // 1. 完全一致
        if(!matched) matched=DB.ingredients.find(function(g){return g.name===riName;})||null;
        // 2. 部分一致
        if(!matched){
          for(var ji=0;ji<DB.ingredients.length;ji++){
            var ing=DB.ingredients[ji];
            if(ing.name.includes(riName)||riName.includes(ing.name)){
              matched=ing; break;
            }
          }
        }
                // 自動食材登録無効
        var rawAmt=ri.amount;
        var parsedAmt=0;
        if(typeof rawAmt==='number') parsedAmt=rawAmt;
        else if(typeof rawAmt==='string'){
          var nm=rawAmt.match(/[\d.]+/);
          parsedAmt=nm?parseFloat(nm[0]):0;
        }
        var parsedUnit=ri.unit||(matched?matched.unit:'')||'';
        if(!parsedUnit && typeof rawAmt==='string'){
          var um=rawAmt.match(/[^\d.\s]+/);
          if(um) parsedUnit=um[0];
        }
        newRecipe.ingredients.push({
          id:genId(),ingredientId:matched?matched.id:'',
          _searchName:riName,  // 取り込み時の元の名前を保持（DB名に差し替えない）
          amount:parsedAmt, unit:parsedUnit
        });
      }
    }
    await dbUpsert('recipes',newRecipe);
    window._pendingRecipe=null;
    var msg='「'+newRecipe.name+'」をレシピに追加しました！';

    alert(msg);
    showPage('recipes');
  }catch(e){alert('保存に失敗しました: '+e.message);}
}

// ========== NUTRITION ==========
function calcRecipeNutrition(recipe){
  var result={kcal:0,protein:0,fat:0,carbs:0,salt:0};
  if(!recipe.ingredients||!recipe.ingredients.length) return result;
  recipe.ingredients.forEach(function(ri){
    var ing=DB.ingredients.find(function(i){return i.id===ri.ingredientId;});
    if(!ing) return;
    var amt=parseFloat(ri.amount||0);
    var rUnit=normUnit((ri.unit||'').trim());
    var iUnit=normUnit((ing.unit||'').trim());
    var convs2=ing.unitConversions||[];
    var gMlUnits=['g','kg','ml','cc','l','dl','グラム','リットル'];
    // Step1: 大単位の正規化
    if(rUnit==='kg'){ amt=amt*1000; rUnit='g'; }
    else if(rUnit==='l'||rUnit==='リットル'){ amt=amt*1000; rUnit='ml'; }
    else if(rUnit==='dl'){ amt=amt*100; rUnit='ml'; }
    // Step2: rUnitがg/mlなら変換不要（基本単位が本/個/丁でも直接g/ml指定はそのまま）
    if(['g','グラム','ml','cc'].includes(rUnit)){
      // amtはそのまま
    }
    // Step3: rUnit==iUnit かつ非g/ml（本指定で基本単位も本）→ g/mlへ換算
    else if(rUnit===iUnit && !gMlUnits.includes(iUnit)){
      var toG2=convs2.find(function(uc){return ['g','グラム'].includes(uc.unit)&&uc.amount>0;});
      var toMl2=convs2.find(function(uc){return ['ml','cc'].includes(uc.unit)&&uc.amount>0;});
      if(toG2) amt=amt*toG2.amount;
      else if(toMl2) amt=amt*toMl2.amount;
    }
    // Step4: rUnit != iUnit かつ非g/ml（大さじ・個など）
    else if(rUnit && rUnit!==iUnit){
      var convN=convs2.find(function(uc){return uc.unit===rUnit;});
      if(convN && convN.amount>0){
        amt=amt*convN.amount;
        if(!gMlUnits.includes(iUnit)){
          var toG3=convs2.find(function(uc){return ['g','グラム'].includes(uc.unit)&&uc.amount>0;});
          var toMl3=convs2.find(function(uc){return ['ml','cc'].includes(uc.unit)&&uc.amount>0;});
          if(toG3) amt=amt*toG3.amount;
          else if(toMl3) amt=amt*toMl3.amount;
        }
      } else {
        if(['大さじ','大'].includes(rUnit)) amt=amt*15;
        else if(['小さじ','小'].includes(rUnit)) amt=amt*5;
        else if(['カップ','cup'].includes(rUnit)) amt=amt*200;
      }
    }
    var ratio100 = amt / 100;
    if(ing.kcal) result.kcal+=ing.kcal*ratio100;
    if(ing.protein) result.protein+=ing.protein*ratio100;
    if(ing.fat) result.fat+=ing.fat*ratio100;
    if(ing.carbs) result.carbs+=ing.carbs*ratio100;
    if(ing.salt) result.salt+=ing.salt*ratio100;
  });
  return result;
}

function calcCourseNutrition(course){
  var result={kcal:0,protein:0,fat:0,carbs:0,salt:0};
  if(!course.dishes||!course.dishes.length) return result;
  course.dishes.forEach(function(d){
    if(d.isPlate){
      (d.elements||[]).forEach(function(e){
        var amt=parseFloat(e.amount||0);
        if(amt<=0) return;
        var unit=normUnit((e.unit||'').trim());
        // ingredient直接指定の場合
        if(e._type==='ingredient'||(e.ingredientId&&!e.recipeId)){
          var ing=DB.ingredients.find(function(x){return x.id===e.ingredientId;});
          if(!ing) return;
          // amtをgに換算してから/100
          var gMlUnits=['g','kg','ml','cc','l','dl','グラム','リットル'];
          var convs=ing.unitConversions||[];
          var iUnit=normUnit((ing.unit||'').trim());
          if(unit==='kg') amt*=1000;
          else if(unit==='l'||unit==='リットル') amt*=1000;
          else if(unit==='dl') amt*=100;
          else if(['g','グラム','ml','cc'].includes(unit)){/* そのまま */}
          else if(unit===iUnit && !gMlUnits.includes(iUnit)){
            var toG=convs.find(function(uc){return ['g','グラム'].includes(uc.unit)&&uc.amount>0;});
            var toMl=convs.find(function(uc){return ['ml','cc'].includes(uc.unit)&&uc.amount>0;});
            if(toG) amt*=toG.amount; else if(toMl) amt*=toMl.amount;
          } else if(unit && unit!==iUnit){
            var cn=convs.find(function(uc){return uc.unit===unit;});
            if(cn&&cn.amount>0){
              amt*=cn.amount;
              if(!gMlUnits.includes(iUnit)){
                var toG2=convs.find(function(uc){return ['g','グラム'].includes(uc.unit)&&uc.amount>0;});
                if(toG2) amt*=toG2.amount;
              }
            } else {
              if(['大さじ','大'].includes(unit)) amt*=15;
              else if(['小さじ','小'].includes(unit)) amt*=5;
              else if(['カップ','cup'].includes(unit)) amt*=200;
            }
          }
          var r100=amt/100;
          if(ing.kcal) result.kcal+=ing.kcal*r100;
          if(ing.protein) result.protein+=ing.protein*r100;
          if(ing.fat) result.fat+=ing.fat*r100;
          if(ing.carbs) result.carbs+=ing.carbs*r100;
          if(ing.salt) result.salt+=ing.salt*r100;
          return;
        }
        // レシピ参照の場合
        var r=DB.recipes.find(function(x){return x.id===e.recipeId;});
        if(!r) return;
        var n=calcRecipeNutrition(r);
        var servings=parseFloat(r.servings||1);
        var ratio=1;
        if(['人分','人','人前','portion'].includes(unit)){
          ratio = servings>0 ? amt/servings : amt;
        } else if(r.yield && parseFloat(r.yield)>0){
          ratio = amt / parseFloat(r.yield);
        } else {
          ratio = servings>0 ? amt/servings : 1;
        }
        result.kcal+=n.kcal*ratio; result.protein+=n.protein*ratio;
        result.fat+=n.fat*ratio; result.carbs+=n.carbs*ratio; result.salt+=n.salt*ratio;
      });
      return;
    }
    // 単品レシピ: 1人分として計算
    var r=DB.recipes.find(function(x){return x.id===d.recipeId;});
    if(!r) return;
    var n=calcRecipeNutrition(r);
    var servings=parseFloat(r.servings||1);
    var ratio=servings>0?1/servings:1;
    result.kcal+=n.kcal*ratio; result.protein+=n.protein*ratio;
    result.fat+=n.fat*ratio; result.carbs+=n.carbs*ratio; result.salt+=n.salt*ratio;
  });
  return result;
}

function autoFetchIfReady(){

async function fetchIngredientInfoAll(){
  if(!DB.settings.anthropicKey){alert('APIキーが設定されていません');return;}
  var name = document.getElementById('if-name')?.value.trim();
  var unit = document.getElementById('if-unit')?.value.trim();
  if(!name||!unit){alert('先に食材名と単位を入力してください');return;}
  // 両方の結果欄に進捗表示
  var el1 = document.getElementById('if-nutrition-result');
  var el2 = document.getElementById('if-unit-conv-result');
  if(el1) el1.innerHTML = '⏳ AIが取得中...';
  if(el2) el2.innerHTML = '';
  var isCount = isCountUnit(unit);
  try{
    var prompt = '「'+name+'」(単位:'+unit+')について以下をJSONのみで回答してください（説明不要）。\n'
      + '{"kcal":数値,"protein":数値,"fat":数値,"carbs":数値,"salt":数値,'
      + '"allergens":["egg/milk/wheat/shrimp/crab/peanut/soba/abalone/squid/salmon/orange/cashew/kiwi/beef/walnut/sesame/salmon2/mackerel/soy/chicken/banana/pork/matsutake/peach/yam/apple/gelatin/almond から該当するもののみ"],'
      + '"dietFlags":["meat/fish/dairy/egg/gluten から該当するもののみ"],';
    if(isCount){
      // 個数単位の場合: g/kg換算のみ（単位換算テーブルは不要）
      prompt += '"gPerUnit":数値(1'+unit+'あたりのグラム数)}';
    } else {
      // 重量・容量単位の場合: 単位換算テーブルのみ
      prompt += '"unitConversions":[{"unit":"大さじ","amount":数値}等 ※'+unit+'に換算した数値。使いそうな単位のみ]}';
    }
    var res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':DB.settings.anthropicKey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:prompt}]})
    });
    var data = await res.json();
    var text = (data.content&&data.content[0]&&data.content[0].text)||'';
    var clean = text.replace(/```json\s*/g,'').replace(/```/g,'').trim();
    var info = JSON.parse(clean);
    // アレルゲン
    if(info.allergens){
      document.querySelectorAll('.if-allergen-cb').forEach(function(cb){
        cb.checked = info.allergens.includes(cb.value);
      });
    }
    // 食事制限
    if(info.dietFlags){
      document.querySelectorAll('.if-diet-cb').forEach(function(cb){
        cb.checked = info.dietFlags.includes(cb.value);
      });
    }
    // 栄養素
    ['kcal','protein','fat','carbs','salt'].forEach(function(k){
      var el = document.getElementById('if-'+k);
      if(el && info[k]!==undefined) el.value = info[k];
    });
    // g換算（個数単位の場合）
    if(isCount && info.gPerUnit && info.gPerUnit > 0){
      var gEl = document.getElementById('if-g-conv');
      if(gEl) gEl.value = info.gPerUnit;
    }
    // 単位換算テーブル（重量・容量単位の場合）
    if(!isCount && info.unitConversions && info.unitConversions.length){
      var convList = document.getElementById('if-unit-conv-list');
      if(convList){
        convList.querySelectorAll('.uc-row').forEach(function(r){r.remove();});
        info.unitConversions.forEach(function(uc){addUnitConvRow(uc.unit,uc.amount);});
      }
    }
    var msg = '✅ 取得完了！内容を確認して保存してください';
    if(el1) el1.innerHTML = msg;
    if(el2) el2.innerHTML = msg;
  }catch(e){
    var errMsg = '❌ エラー: '+e.message;
    if(el1) el1.innerHTML = errMsg;
    if(el2) el2.innerHTML = errMsg;
  }
}

// 音声入力（Web Speech API）
var _voiceRecognition = null;
function toggleVoiceInput(btnId, targetId){
  var btn = document.getElementById(btnId);
  var target = document.getElementById(targetId);
  if(!target) return;

  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert('お使いのブラウザは音声入力に対応していません。Safariをお試しください。');
    return;
  }

  if(_voiceRecognition){
    _voiceRecognition.stop();
    _voiceRecognition = null;
    if(btn){ btn.textContent='🎙️ 音声入力'; btn.style.background='var(--accent)'; }
    return;
  }

  var rec = new SpeechRecognition();
  rec.lang = 'ja-JP';
  rec.continuous = true;
  rec.interimResults = true;
  _voiceRecognition = rec;

  if(btn){ btn.textContent='⏹️ 録音停止'; btn.style.background='#e74c3c'; }

  rec.onresult = function(e){
    var transcript = '';
    for(var i=0;i<e.results.length;i++){
      transcript += e.results[i][0].transcript;
    }
    target.value = transcript;
  };
  rec.onerror = function(e){
    if(btn){ btn.textContent='🎙️ 音声入力'; btn.style.background='var(--accent)'; }
    _voiceRecognition = null;
    alert('音声認識エラー: '+e.error);
  };
  rec.onend = function(){
    if(btn){ btn.textContent='🎙️ 音声入力'; btn.style.background='var(--accent)'; }
    _voiceRecognition = null;
  };
  rec.start();
}

async function fetchNutritionForAll(){
  if(!DB.settings.anthropicKey){alert('APIキーが設定されていません');return;}
  var ings=DB.ingredients.filter(function(i){
    var noKcal=!i.kcal||i.kcal===0;
    var noAllergens=!i.allergens||!i.allergens.length;
    var noConversions=!i.unitConversions||!i.unitConversions.length;
    return noKcal||noAllergens||noConversions;
  });
  if(!ings.length){alert('全食材の情報は登録済みです');return;}
  var el=document.getElementById('nutrition-fetch-result');
  var BATCH=25; // 25件ずつ処理
  var total=ings.length;
  var updated=0;
  var errs=[];
  for(var bi=0;bi<ings.length;bi+=BATCH){
    var batch=ings.slice(bi,bi+BATCH);
    var batchNum=Math.floor(bi/BATCH)+1;
    var totalBatches=Math.ceil(ings.length/BATCH);
    if(el) el.innerHTML='<div style="padding:8px;background:#cce5ff;border-radius:6px;font-size:12px">⏳ '
      +(bi+1)+'〜'+Math.min(bi+BATCH,total)+'件目を処理中... ('+batchNum+'/'+totalBatches+')</div>';
    var names=batch.map(function(i){return i.name+'('+i.unit+')';}).join('、');
    try{
      var res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':DB.settings.anthropicKey,
          'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,
          messages:[{role:'user',content:'以下の食材について、それぞれの情報を日本語でJSONのみで回答してください（説明不要・コードブロック不要）。必ず全件回答してください。\n'
            +'形式: [{"name":"食材名","kcal":数値,"protein":数値,"fat":数値,"carbs":数値,"salt":数値,'
            +'"allergens":["egg/milk/wheat/shrimp/crab/peanut/soba/abalone/squid/salmon/orange/cashew/kiwi/beef/walnut/sesame/salmon2/mackerel/soy/chicken/banana/pork/matsutake/peach/yam/apple/gelatin/almond から該当するもののみ"],'
            +'"dietFlags":["meat/fish/dairy/egg/gluten から該当するもののみ"],'
            +'"unitConversions":[{"unit":"大さじ","amount":数値},{"unit":"小さじ","amount":数値}等 ※基本単位1あたりのg換算値。大さじ・小さじ・カップ・cc・ml・個・本など使いそうな単位のみ]}]\n'
            +'食材一覧: '+names}]
        })
      });
      var data=await res.json();
      var text=(data.content&&data.content[0]&&data.content[0].text)||'';
      var clean=text.replace(/```json|```/g,'').trim();
      var start=clean.indexOf('[');
      if(start>0) clean=clean.slice(start);
      var list=JSON.parse(clean);
      list.forEach(function(item){
        var ing=DB.ingredients.find(function(i){return i.name===item.name;});
        if(ing){
          ing.kcal=item.kcal||0; ing.protein=item.protein||0;
          ing.fat=item.fat||0; ing.carbs=item.carbs||0; ing.salt=item.salt||0;
          // アレルゲン・食事制限区分も保存（既存データがない場合のみ）
          if(item.allergens&&item.allergens.length&&(!ing.allergens||!ing.allergens.length)){
            ing.allergens=item.allergens;
          }
          if(item.dietFlags&&item.dietFlags.length&&(!ing.dietFlags||!ing.dietFlags.length)){
            ing.dietFlags=item.dietFlags;
          }
          if(item.unitConversions&&item.unitConversions.length&&(!ing.unitConversions||!ing.unitConversions.length)){
            ing.unitConversions=item.unitConversions;
          }
          updated++;
        }
      });
      saveLocal();
    }catch(e){
      errs.push('バッチ'+batchNum+': '+e.message);
    }
    // APIレート制限対策
    if(bi+BATCH<ings.length) await new Promise(function(r){setTimeout(r,500);});
  }
  if(el){
    if(errs.length>0)
      el.innerHTML='<div style="padding:8px;background:#fff3cd;border-radius:6px;font-size:12px">⚠️ '+updated+'件取得完了（エラー: '+errs.join(', ')+'）クラウドへ保存を忘れずに。</div>';
    else
      el.innerHTML='<div style="padding:8px;background:#d4edda;border-radius:6px;font-size:12px;color:#1e7e34">✅ '+updated+'件の食材の栄養素を取得しました！クラウドへ保存を忘れずに。</div>';
  }
}

async function syncFromCloud(skipRefresh){
  if(!useCloud||!sbClient){ showPage('dashboard'); return; }
  try{
    const [ri,rr,rc]=[
      await sbClient.from('ingredients').select('*'),
      await sbClient.from('recipes').select('*'),
      await sbClient.from('courses').select('*')
    ];
    // Only overwrite local data if cloud actually has records
    if(!ri.error && ri.data && ri.data.length > 0) DB.ingredients=ri.data;
    if(!rr.error && rr.data && rr.data.length > 0) DB.recipes=rr.data;
    if(!rc.error && rc.data && rc.data.length > 0) DB.courses=rc.data;
    saveLocal();
    // 起動時はskipRefresh=trueで呼ばれるのでshowPageしない（呼び元が制御）
    if(!skipRefresh && typeof currentPage !== 'undefined' && currentPage) showPage(currentPage);
    var syncEl=document.getElementById('settings-result');
    if(syncEl&&!skipRefresh){
      syncEl.innerHTML='<div style="color:var(--accent-dark);font-size:13px;padding:8px 0">✅ 同期完了！（食材'+DB.ingredients.length+'件・レシピ'+DB.recipes.length+'件）</div>';
      setTimeout(function(){if(syncEl)syncEl.innerHTML='';},4000);
    }
    const el=document.getElementById('settings-result');
    if(el) el.innerHTML='<div style="padding:10px;background:#d4edda;border-radius:8px;font-size:13px;color:#1e7e34">✅ 同期完了 (' + new Date().toLocaleTimeString('ja-JP') + ')</div>';
  }catch(e){ console.error('Sync error',e); }
}

function renderGConvList(){
  var el = document.getElementById('g-conv-list');
  if(!el) return;
  
  var targets = DB.ingredients.filter(function(i){
    return COUNT_UNITS_LIST.includes(i.unit);
  }).sort(function(a,b){ return a.name.localeCompare(b.name,'ja'); });

  if(!targets.length){
    el.innerHTML = '<p style="color:var(--text-muted);font-size:13px">該当する食材がありません</p>';
    return;
  }

  var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">';
  targets.forEach(function(ing){
    var existing = (ing.unitConversions||[]).find(function(uc){
      return uc.unit === ing.unit && uc.amount >= 1;
    });
    var val = existing ? existing.amount : '';
    var hasVal = val !== '';
    html += '<div style="display:flex;gap:6px;align-items:center;padding:6px 8px;background:'+(hasVal?'var(--bg2)':'#fff8f0')+';border-radius:6px;border:1px solid '+(hasVal?'var(--border)':'#f0a500')+'">'
      + '<span style="flex:1;font-size:13px;font-weight:'+(hasVal?'400':'600')+';color:'+(hasVal?'var(--text)':'#c07000')+'">'
        + ing.name
        + '<span style="font-size:11px;color:var(--text-muted);margin-left:4px">('+ing.unit+')</span>'
      + '</span>'
      + '<span style="font-size:12px;color:var(--text-muted)">1'+ing.unit+'=</span>'
      + '<input type="number" data-id="'+ing.id+'" data-unit="'+ing.unit+'" value="'+val+'" placeholder="g" step="any" min="0" '
        + 'style="width:70px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:right">'
      + '<span style="font-size:12px;font-weight:600">g</span>'
      + '</div>';
  });
  html += '</div>';
  html += '<p style="font-size:11px;color:var(--text-muted)">オレンジ色 = 未登録 / グレー = 登録済み</p>';
  el.innerHTML = html;
}

async function saveAllGConversions(){
  var inputs = document.querySelectorAll('#g-conv-list input[data-id]');
  var updated = 0;
  var el = document.getElementById('g-conv-result');
  if(el) el.textContent = '保存中...';

  for(var i=0; i<inputs.length; i++){
    var inp = inputs[i];
    var val = parseFloat(inp.value);
    if(isNaN(val) || val <= 0) continue;
    var id = inp.dataset.id;
    var unit = inp.dataset.unit;
    var ing = DB.ingredients.find(function(x){return x.id===id;});
    if(!ing) continue;

    // 既存のunit換算を削除して新しい値で上書き
    var convs = (ing.unitConversions||[]).filter(function(uc){ return uc.unit !== unit; });
    convs.unshift({unit: unit, amount: val});
    ing.unitConversions = convs;
    await dbUpsert('ingredients', ing);
    updated++;
  }

  saveLocal();
  if(el) el.textContent = '✅ ' + updated + '件保存しました';
  renderGConvList();
}

async function pushToGithub(){
  const token=DB.settings.githubToken;
  const repo=DB.settings.githubRepo||'okiwassa-cmyk/wassawassa-recipe';
  const path=DB.settings.githubPath||'index.html';
  const el=document.getElementById('github-result');
  if(!token){
    if(el) el.innerHTML='<div style="padding:10px;background:#fff3cd;border-radius:8px;font-size:13px">⚠️ 先にGitHub設定を保存してください</div>';
    return;
  }
  if(el) el.innerHTML='<div style="padding:10px;background:#cce5ff;border-radius:8px;font-size:13px">⏳ GitHubへアップロード中...</div>';
  try{
    // 現在のSHAを取得
    const getRes=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}
    });
    let sha=null;
    if(getRes.ok){ const d=await getRes.json(); sha=d.sha; }
    // 現在のHTMLをbase64化
    const html=document.documentElement.outerHTML;
    const b64=btoa(unescape(encodeURIComponent(html)));
    const body={message:`Update ${path} from app - ${new Date().toISOString()}`,content:b64};
    if(sha) body.sha=sha;
    const putRes=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'PUT',
      headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(putRes.ok){
      const d=await putRes.json();
      if(el) el.innerHTML=`<div style="padding:10px;background:#d4edda;border-radius:8px;font-size:13px;color:#1e7e34">🎉 アップロード成功！ コミット: ${d.commit.sha.substring(0,7)}<br>GitHub Pagesへの反映に1〜2分かかります</div>`;
    } else {
      const err=await putRes.json();
      if(el) el.innerHTML=`<div style="padding:10px;background:#f8d7da;border-radius:8px;font-size:13px">❌ エラー ${putRes.status}: ${err.message}</div>`;
    }
  }catch(e){
    if(el) el.innerHTML=`<div style="padding:10px;background:#f8d7da;border-radius:8px;font-size:13px">❌ 通信エラー: ${e.message}</div>`;
  }
}

function importJSON(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{const d=JSON.parse(e.target.result);if(d.recipes!==undefined||d.ingredients!==undefined){if(confirm('現在のデータを上書きしますか？')){DB={...DB,...d};saveLocal();closeModal();showPage('dashboard');alert('読み込みました！');}}else alert('有効なファイルではありません');}
    catch(e){alert('読み込みに失敗しました');}
  };reader.readAsText(file);
}

        <button onclick="document.getElementById('staff-pw-modal').remove()" style="flex:1;padding:10px;background:var(--bg);color:var(--text-light);border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer">キャンセル</button>
        <button onclick="doStaffLogin()" style="flex:1;padding:10px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer">入室</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  // コールバック保存
  window._staffLoginCallback = onSuccess;
  setTimeout(function(){ document.getElementById('staff-pw-input')?.focus(); }, 100);
}

function doStaffLogin() {
  var pw = document.getElementById('staff-pw-input').value;
  if(pw === getStaffPassword()) {
    document.getElementById('staff-pw-modal').remove();
    if(typeof window._staffLoginCallback === 'function') window._staffLoginCallback();
    window._staffLoginCallback = null;
  } else {
    document.getElementById('staff-pw-error').textContent = 'パスワードが違います';
    document.getElementById('staff-pw-input').value = '';
    document.getElementById('staff-pw-input').focus();
  }
}

function toggleStaffMode(){
  if(!isStaffMode){
    // スタッフモードへ → スタッフパスワード確認
    showStaffPasswordModal(function(){
      isStaffMode = true;
      document.body.classList.add('staff-mode');
      staffShowPage('courses');
    });
  } else {
    // 管理モードへ戻る → 管理者パスワード確認
    showAdminPasswordModal(function(){
      isStaffMode = false;
      document.body.classList.remove('staff-mode');
      document.getElementById('sidebar').style.display = '';
      showPage('dashboard');
    });
  }
}

function showAdminPasswordModal(onSuccess) {
  var existing = document.getElementById('admin-pw-modal');
  if(existing) existing.remove();
  var overlay = document.createElement('div');
  overlay.id = 'admin-pw-modal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="background:var(--white);border-radius:16px;padding:32px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,0.4)">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:28px;margin-bottom:8px">⚙️</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)">管理モード</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">管理者パスワードを入力してください</div>
      </div>
      <input type="password" id="admin-pw-input" placeholder="管理者パスワード"
        style="width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;margin-bottom:8px;box-sizing:border-box"
        onkeydown="if(event.key==='Enter')doAdminLogin()">
      <div id="admin-pw-error" style="color:#c0392b;font-size:12px;min-height:18px;margin-bottom:10px"></div>
      <div style="display:flex;gap:8px">
        <button onclick="document.getElementById('admin-pw-modal').remove()" style="flex:1;padding:10px;background:var(--bg);color:var(--text-light);border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer">キャンセル</button>
        <button onclick="doAdminLogin()" style="flex:1;padding:10px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer">入室</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  window._adminLoginCallback = onSuccess;
  setTimeout(function(){ document.getElementById('admin-pw-input')?.focus(); }, 100);
}

function doAdminLogin() {
  var pw = document.getElementById('admin-pw-input').value;
  if(pw === getStoredPassword()) {
    document.getElementById('admin-pw-modal').remove();
    if(typeof window._adminLoginCallback === 'function') window._adminLoginCallback();
    window._adminLoginCallback = null;
  } else {
    document.getElementById('admin-pw-error').textContent = 'パスワードが違います';
    document.getElementById('admin-pw-input').value = '';
    document.getElementById('admin-pw-input').focus();
  }
}

function staffShowPage(page){
  ['courses','recipes'].forEach(function(p){
    var btn = document.getElementById('snav-'+p);
    if(btn) btn.classList.toggle('active', p===page);
  });
  showPage(page);
}

// ?staff URLパラメータ対応
(function(){
  if(window.location.search.indexOf('staff') !== -1 && !isStaffMode){
    // ログイン後に実行されるよう少し遅延
    setTimeout(function(){
      if(!document.body.classList.contains('staff-mode')){
        showStaffPasswordModal(function(){
          isStaffMode = true;
          document.body.classList.add('staff-mode');
          staffShowPage('courses');
        });
      }
    }, 600);
  }
})();

function doLogout() {
  localStorage.removeItem('ww_auth');
  location.reload();
}

// ========== INIT ==========
async function _startApp(){ await loadLocal(); _initApp(); }
function _initApp(){
  if (!isLoggedIn()) {
    showLoginScreen();
  } else {
    document.getElementById('sidebar').style.display = '';
    if(DB.settings?.supabaseUrl && DB.settings?.supabaseKey){
      initSupabase(DB.settings.supabaseUrl, DB.settings.supabaseKey);
      var _loadingEl = document.getElementById('loading-overlay');
      if(_loadingEl) _loadingEl.style.display = 'flex';
      var _syncDone = false;
      var _syncTimeout = setTimeout(function(){
        if(!_syncDone){
          _syncDone = true;
          if(_loadingEl) _loadingEl.style.display = 'none';
          showPage('dashboard');
        }
      }, 8000);
      var _syncPromise = syncFromCloud(true);
      if(!_syncPromise || typeof _syncPromise.then !== 'function'){
        if(!_syncDone){ _syncDone=true; clearTimeout(_syncTimeout); if(_loadingEl) _loadingEl.style.display='none'; showPage('dashboard'); }
      } else {
      _syncPromise.then(function(){
        if(!_syncDone){
          _syncDone = true;
          clearTimeout(_syncTimeout);
          if(_loadingEl) _loadingEl.style.display = 'none';
          showPage('dashboard');
        }
      }).catch(function(){
        if(!_syncDone){
          _syncDone = true;
          clearTimeout(_syncTimeout);
          if(_loadingEl) _loadingEl.style.display = 'none';
          showPage('dashboard');
        }
      });
      } // end if _syncPromise
    } else {
      showPage('dashboard');
    }
  }
}
// DOMが準備できてから起動
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', _startApp);
} else {
  _startApp();
}
</script>
</body>
</html>
