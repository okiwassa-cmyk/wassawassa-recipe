<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WASSA WASSA レシピブック</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#f5f0e8;--bg2:#ede8de;--bg3:#e5dfd3;
    --greige:#b5aa96;--greige-dark:#8a7e6a;--greige-light:#ccc4b4;
    --text:#3d3830;--text-light:#6e6557;--text-muted:#9e9285;
    --accent:#7a9e7e;--accent-light:#a8c5ac;--accent-dark:#5a7e5e;
    --border:#d0c8b8;--white:#faf8f4;--shadow:rgba(61,56,48,0.12);--gold:#c4a55a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  /* SIDEBAR */
  #sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--text);color:var(--bg);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
  .sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,0.1);text-align:center}
  .sidebar-logo img{width:190px;max-height:115px;object-fit:contain;margin-bottom:6px}
  .logo-sub{font-size:9px;letter-spacing:0.18em;color:var(--greige);display:block;margin-top:2px}
  nav{padding:12px 0;flex:1}
  .nav-section{padding:8px 20px 4px;font-size:9px;letter-spacing:0.25em;color:var(--greige);text-transform:uppercase}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all .2s;font-size:13px;color:var(--greige-light);border-left:3px solid transparent}
  .nav-item:hover{background:rgba(255,255,255,0.06);color:var(--white)}
  .nav-item.active{background:rgba(168,197,172,0.15);color:var(--accent-light);border-left-color:var(--accent-light)}
  .nav-item .icon{font-size:15px;width:20px;text-align:center}

  /* CLOUD STATUS */
  .cloud-status{padding:10px 16px;border-top:1px solid rgba(255,255,255,0.08);font-size:11px;display:flex;align-items:center;gap:6px}
  .cloud-dot{width:7px;height:7px;border-radius:50%;background:#666;flex-shrink:0}
  .cloud-dot.connected{background:#7a9e7e}
  .cloud-dot.offline{background:#e67e22}
  .cloud-dot.error{background:#c0392b}

  /* MAIN */
  #main{margin-left:240px;min-height:100vh;display:flex;flex-direction:column}
  .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
  .topbar-actions{display:flex;gap:8px}
  .content{padding:28px 32px;flex:1}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;transition:all .2s;white-space:nowrap}
  .btn-primary{background:var(--accent);color:white}
  .btn-primary:hover{background:var(--accent-dark)}
  .btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{background:var(--bg2)}
  .btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}
  .btn-outline:hover{background:var(--accent);color:white}
  .btn-danger{background:#c0392b;color:white}
  .btn-danger:hover{background:#a93226}
  .btn-gold{background:var(--gold);color:white}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-icon{padding:6px 10px}

  /* CARDS */
  .card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400}

  /* RECIPE GRID */
  .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
  .recipe-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .25s}
  .recipe-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px var(--shadow);border-color:var(--accent-light)}
  .recipe-card-img{width:100%;height:150px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--greige);position:relative;overflow:hidden}
  .recipe-card-img img{width:100%;height:100%;object-fit:cover}
  .recipe-card-fav{position:absolute;top:8px;right:8px;background:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);border:none;transition:transform .2s}
  .recipe-card-fav:hover{transform:scale(1.2)}
  .recipe-card-body{padding:14px}
  .recipe-card-category{font-size:10px;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;margin-bottom:3px}
  .recipe-card-name{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:400;margin-bottom:6px;line-height:1.4}
  .recipe-card-meta{display:flex;gap:10px;font-size:11px;color:var(--text-muted)}
  .recipe-card-cost{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:11px}
  .cost-badge{background:var(--bg2);padding:2px 8px;border-radius:10px;font-size:11px;color:var(--text-light)}
  .cost-ratio-good{color:var(--accent-dark);font-weight:600}
  .cost-ratio-warn{color:var(--gold);font-weight:600}
  .cost-ratio-bad{color:#c0392b;font-weight:600}

  /* SEARCH */
  .search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
  .search-input-wrap{flex:1;min-width:200px;position:relative}
  .search-input-wrap input{width:100%;padding:10px 16px;border:1px solid var(--border);border-radius:8px;background:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);outline:none}
  .search-input-wrap input:focus{border-color:var(--accent)}
  .search-icon{display:none}
  .filter-select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);outline:none;cursor:pointer}
  .filter-select:focus{border-color:var(--accent)}

  /* FORMS */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group.full{grid-column:1/-1}
  label{font-size:12px;color:var(--text-light);letter-spacing:.05em}
  input[type=text],input[type=number],input[type=url],input[type=email],input[type=password],textarea,select.form-control{padding:9px 12px;border:1px solid var(--border);border-radius:7px;background:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
  input:focus,textarea:focus,select.form-control:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:70px;line-height:1.6}

  /* TABLE */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:var(--bg2);padding:9px 12px;text-align:left;font-size:11px;letter-spacing:.08em;color:var(--text-light);border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:9px 12px;border-bottom:1px solid var(--bg3);vertical-align:middle}
  tr:hover td{background:var(--bg)}
  .td-num{text-align:right;font-variant-numeric:tabular-nums}

  /* TABS */
  .tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px}
  .tab{padding:9px 18px;cursor:pointer;font-size:13px;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent-dark);border-bottom-color:var(--accent);font-weight:600}

  /* MODALS */
  .modal-overlay{position:fixed;inset:0;background:rgba(61,56,48,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--white);border-radius:16px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal-lg{max-width:900px}
  .modal-header{padding:22px 26px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1}
  .modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400}
  .modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-muted);padding:4px;line-height:1}
  .modal-body{padding:22px 26px}
  .modal-footer{padding:14px 26px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
  .stat-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px}
  .stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.1em;margin-bottom:5px}
  .stat-value{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300}
  .stat-unit{font-size:12px;color:var(--text-muted);margin-left:2px}
  .stat-accent{border-left:3px solid var(--accent)}
  .stat-gold{border-left:3px solid var(--gold)}

  /* INGREDIENT ROW */
  .ingredient-row{display:flex;flex-direction:row;gap:8px;align-items:flex-start;margin-bottom:10px}
  .ingredient-cost-display{font-size:12px;color:var(--accent-dark);text-align:right;font-variant-numeric:tabular-nums}

  /* STEP */
  .step-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
  .step-num{width:26px;height:26px;background:var(--accent);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:8px}

  /* TAG */
  .tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--text-light)}
  .tag-remove{cursor:pointer;color:var(--text-muted);font-size:10px}
  .tag-remove:hover{color:#c0392b}
  .tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}

  /* PHOTO */
  .photo-drop{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text-muted);font-size:13px}
  .photo-drop:hover{border-color:var(--accent);background:rgba(168,197,172,.05)}
  .photo-drop-icon{font-size:28px;margin-bottom:6px}

  /* COURSE SLOT */
  .course-slot{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
  .course-slot-num{width:26px;height:26px;background:var(--greige);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}

  /* IMPORT TABS */
  .import-tabs{display:flex;gap:0;margin-bottom:16px}
  .import-tab{flex:1;padding:10px;text-align:center;border:1px solid var(--border);cursor:pointer;font-size:13px;transition:all .2s;background:var(--bg);color:var(--text-muted)}
  .import-tab:first-child{border-radius:7px 0 0 7px}
  .import-tab:last-child{border-radius:0 7px 7px 0}
  .import-tab.active{background:var(--accent);color:white;border-color:var(--accent)}

  /* SUPABASE SETUP BANNER */
  .setup-banner{background:linear-gradient(135deg,#3d3830 0%,#5a7e5e 100%);color:white;border-radius:12px;padding:24px;margin-bottom:20px}
  .setup-banner h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;margin-bottom:8px}
  .setup-banner p{font-size:13px;opacity:.85;line-height:1.7;margin-bottom:16px}
  .setup-step{display:flex;gap:12px;margin-bottom:10px;font-size:12px;opacity:.9}
  .setup-step-num{width:22px;height:22px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}

  /* TAX DISPLAY */
  .tax-info{font-size:11px;color:var(--text-muted);margin-top:3px}

  /* MISC */
  .hidden{display:none!important}
  .empty-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
  .empty-state-icon{font-size:44px;margin-bottom:10px}
  .empty-state h3{font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:6px;color:var(--text-light)}
  .monstera-deco{position:fixed;pointer-events:none;opacity:.035;font-size:180px;right:-20px;bottom:-10px;z-index:0;transform:rotate(-15deg);line-height:1}
  .loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg2)}
  ::-webkit-scrollbar-thumb{background:var(--greige-light);border-radius:3px}
  .mobile-menu-btn{display:none;position:fixed;top:14px;left:16px;z-index:300;background:var(--text);color:white;border:none;border-radius:6px;padding:8px 10px;cursor:pointer;font-size:16px}
  @media(max-width:768px){
    #sidebar{transform:translateX(-100%);transition:transform .3s}
    #sidebar.open{transform:translateX(0)}
    #main{margin-left:0}
    .form-grid,.form-grid-3{grid-template-columns:1fr}
    .recipe-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
    .ingredient-row{grid-template-columns:1fr 1fr}
    .mobile-menu-btn{display:block}
  }
  @media print{#sidebar,.topbar,.no-print{display:none!important}#main{margin-left:0}.content{padding:0}body{background:white}}

  /* CATEGORY BADGE */
  .course-category-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;letter-spacing:.05em}
  .cat-dinner{background:#e8f4e8;color:#2d6a2d}
  .cat-kids{background:#fff0e0;color:#a05000}
  .cat-breakfast{background:#e0eeff;color:#1a4a8a}

  /* ===== iPad/Mobile レスポンシブ ===== */
  @media (max-width: 820px) {
    /* サイドバーをオーバーレイに */
    #sidebar {
      position: fixed !important;
      left: -240px;
      top: 0; bottom: 0;
      z-index: 9000;
      transition: left 0.25s ease;
      box-shadow: none;
    }
    #sidebar.sidebar-open {
      left: 0 !important;
      box-shadow: 4px 0 24px rgba(0,0,0,0.18);
    }
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 8999;
    }
    #sidebar-overlay.active { display: block; }
    #main { margin-left: 0 !important; }
    /* 食材テーブルの一部列を非表示（仕入先・在庫） */
    .ing-col-supplier, .ing-col-stock { display: none !important; }
    /* モーダルを広く */
    .modal { width: 96vw !important; }
    /* タブのフォントサイズ */
    .tab { font-size: 12px !important; padding: 7px 8px !important; }
    /* ボタンのタップターゲットを大きく */
    .btn-sm { min-height: 36px; }
    .btn-icon { min-width: 36px; min-height: 36px; }
    /* コース編集のレシピ検索を折り返し */
    .course-slot { flex-wrap: wrap !important; gap: 6px !important; }
  }

@media(max-width:900px){.ing-col-cat{display:none}.ing-col-supplier{display:none}.ing-col-stock{display:none}}
@media(max-width:600px){.recipe-grid{grid-template-columns:repeat(2,1fr)!important}}
  /* ===== スタッフモード ===== */
  .staff-mode #sidebar { display:none !important; }
  .staff-mode #main { margin-left:0 !important; padding-top:56px; }
  #staff-topbar { display:none; position:fixed; top:0; left:0; right:0; z-index:200;
    background:#3d5a40; padding:10px 16px; align-items:center; gap:10px; box-shadow:0 2px 10px rgba(0,0,0,.3); z-index:100; }
  .staff-mode #staff-topbar { display:flex !important; }
  .staff-mode .topbar { display:none; }
  .staff-nav-btn { background:rgba(255,255,255,0.15); color:#fff; border:2px solid rgba(255,255,255,0.2);
    border-radius:20px; padding:7px 20px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
  .staff-nav-btn.active { background:#a8c5ac; color:#2d4a30; border-color:#a8c5ac; }
  .staff-nav-btn:hover { background:rgba(255,255,255,0.25); }
  .staff-mode .no-staff { display:none !important; }
</style>
</head>

function showIngSuggest(inputEl, query, pool, onSelect){
  hideIngSuggest();

  var matches=pool.filter(function(i){return i.name.includes(query);}).slice(0,12);
  if(!matches.length) return;

  dd.id='ing-suggest-dropdown';
  dd.style.cssText='position:fixed;left:'+rect.left+'px;top:'+(rect.bottom+2)+'px;width:'+rect.width+'px;'
    +'background:var(--white);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);'
    +'z-index:99999;max-height:260px;overflow-y:auto';
  dd.innerHTML=matches.map(function(i){
    var hasPrice=i.unitPrice!==null&&i.unitPrice!==undefined&&i.unitPrice!=='';
    var lq=query.toLowerCase();var ln=i.name.toLowerCase();var p=ln.indexOf(lq);
    var hi=p>=0?i.name.slice(0,p)+'<strong>'+i.name.slice(p,p+query.length)+'</strong>'+i.name.slice(p+query.length):i.name;
    return '<div class="ing-suggest-item" data-id="'+i.id+'" data-name="'+i.name+'" data-unit="'+i.unit+'"'
      +' style="padding:8px 12px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bg2)">'
      +'<span>'+hi+'</span>'

      +'</div>';
  }).join('');
  document.body.appendChild(dd);
  dd.querySelectorAll('.ing-suggest-item').forEach(function(item){
    item.addEventListener('mousedown',function(e){
      e.preventDefault();
      onSelect({id:this.dataset.id,name:this.dataset.name,unit:this.dataset.unit});
      hideIngSuggest();
    });
  });
}
function hideIngSuggest(){
  var old=document.getElementById('ing-suggest-dropdown');
  if(old) old.parentNode.removeChild(old);
}


function showFieldSuggest(inputEl, pool){
  var existing=document.getElementById('ing-suggest-dropdown');
  // 同じinputをもう一回クリック → 閉じる
  if(existing&&existing._sourceId===inputEl.id){ hideIngSuggest(); return; }
  hideIngSuggest();
  var query=(inputEl.value||''). trim();
  var hit=pool.filter(function(v){return v.toLowerCase().includes(query.toLowerCase());});
  var rest=pool.filter(function(v){return !v.toLowerCase().includes(query.toLowerCase());});
  var matches=(query?hit.concat(rest):pool).slice(0,30);
  if(!matches.length) return;
  var rect=inputEl.getBoundingClientRect();
  var dd=document.createElement('div');
  dd.id='ing-suggest-dropdown';
  dd._sourceId=inputEl.id;
  dd.style.cssText='position:fixed;left:'+rect.left+'px;top:'+(rect.bottom+2)+'px;'
    +'width:'+Math.max(rect.width,160)+'px;'

    +'box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:99999;'
    +'max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch';

    item.textContent=v;

// ========== 検索ユーティリティ ==========
function toHiragana(str) {
  return str.replace(/[ァ-ヶ]/g, function(c) {
    return String.fromCharCode(c.charCodeAt(0) - 0x60);
  });
}
function toKatakana(str) {
  return str.replace(/[ぁ-ゖ]/g, function(c) {
    return String.fromCharCode(c.charCodeAt(0) + 0x60);
  });
}
function normalizeSearch(str) {
  var s = str.toLowerCase();
  return [s, toHiragana(s), toKatakana(s)];
}
// 読み仮名→漢字の簡易対応（よく使う食材）
var _kanaKanjiMap = {
  'だし':'出汁','みそ':'味噌','しょうゆ':'醤油','さとう':'砂糖','しお':'塩',
  'こしょう':'胡椒','にんにく':'大蒜','しょうが':'生姜','ねぎ':'葱','たまねぎ':'玉ねぎ',
  'にんじん':'人参','じゃがいも':'じゃが芋','さつまいも':'薩摩芋','ごぼう':'牛蒡',
  'れんこん':'蓮根','かぼちゃ':'南瓜','なす':'茄子','きゅうり':'胡瓜','とまと':'トマト',
  'もやし':'萌やし','ほうれんそう':'ほうれん草','こまつな':'小松菜','はくさい':'白菜',
  'とうふ':'豆腐','あぶらあげ':'油揚げ','なっとう':'納豆','みりん':'味醂',
  'さけ':'鮭','まぐろ':'鮪','さば':'鯖','あじ':'鯵','いわし':'鰯','たら':'鱈',
  'えび':'海老','かに':'蟹','いか':'烏賊','たこ':'蛸','あさり':'浅蜊',
  'とりにく':'鶏肉','ぶたにく':'豚肉','ぎゅうにく':'牛肉','たまご':'卵',
  'きのこ':'茸','しいたけ':'椎茸','えのき':'榎茸','しめじ':'占地',
  'ごま':'胡麻','みつば':'三つ葉','しそ':'紫蘇','うめ':'梅'
};

function searchMatch(text, query) {
  if (!query) return true;
  var t = text.toLowerCase();
  var th = toHiragana(t);
  var tk = toKatakana(t);
  var qh = toHiragana(query.toLowerCase());
  var norms = normalizeSearch(query);
  // 通常マッチ
  if(norms.some(function(q){ return t.includes(q) || th.includes(q) || tk.includes(q); })) return true;
  // 読みから漢字へのマッチ（「みそ」→「味噌」を検索）
  var kanjiTarget = _kanaKanjiMap[qh];
  if(kanjiTarget && t.includes(kanjiTarget.toLowerCase())) return true;
  // 逆に漢字から読みへのマッチ（「味噌」入力→「みそ」候補にマッチ）
  for(var kana in _kanaKanjiMap){
    if(t.includes(_kanaKanjiMap[kana].toLowerCase())||th.includes(kana)){
      if(kana.includes(qh)||qh.includes(kana)) return true;
    }
  }
  return false;
}

// Cloud CRUD wrappers
async function dbGetAll(table) {
  if (useCloud && sbClient) {
    try {
      const { data, error } = await sbClient.from(table).select('*').order('created_at', {ascending:false});
      if (!error && data) return data;
    } catch(e) {}
  }
  return DB[table] || [];
}

async function dbUpsert(table, record) {
  const r = { ...record, updated_at: new Date().toISOString() };
  if (!r.created_at) r.created_at = new Date().toISOString();
  if (useCloud && sbClient) {
    try {
      await sbClient.from(table).upsert(r);
    } catch(e) { console.error(e); }
  }
  const arr = DB[table] || [];
  const idx = arr.findIndex(x => x.id === r.id);
  if (idx >= 0) arr[idx] = r; else arr.push(r);
  DB[table] = arr;
  saveLocal();
  return r;
}

async function dbDelete(table, id) {
  if (useCloud && sbClient) {
    try { await sbClient.from(table).delete().eq('id', id); } catch(e) {}
  }
  DB[table] = (DB[table] || []).filter(x => x.id !== id);
  saveLocal();
}

// g換算フォームを表示するか判定（重量・容量単位以外はすべてカウント単位扱い）
var WEIGHT_VOL_UNITS = ['g','kg','ml','l','L','cc','リットル'];
// 分数対応のparseAmount（例: "1/4"→0.25, "1/16"→0.0625）
function parseAmount(val){
  if(!val && val!==0) return 0;
  var s = String(val).trim();
  var m = s.match(/^(\d+)\s*\/\s*(\d+)$/);
  if(m) return parseFloat(m[1]) / parseFloat(m[2]);
  return parseFloat(s) || 0;
}

function isCountUnit(unit){
  var u = (unit||'').trim();
  if(!u) return false;
  return !WEIGHT_VOL_UNITS.includes(u);
}


// 換算テーブルを考慮した原価計算
function calcIngCost(ing, amount, unit) {
  if(!ing || ing.unitPrice===null || ing.unitPrice===undefined || ing.unitPrice==='' || !amount) return 0;
  var a = parseAmount(amount);
  var riUnit = (unit||'').trim();
  var ingUnit = (ing.unit||'').trim();

  // 同義語グループで正規化（例: pc→袋、枝→本）
  function normUnit(u){
    for(var gi=0;gi<UNIT_SYNONYM_GROUPS.length;gi++){
      if(UNIT_SYNONYM_GROUPS[gi].indexOf(u)>=0) return UNIT_SYNONYM_GROUPS[gi][0];
    }
    return u;
  }
  var riUnitNorm = normUnit(riUnit);
  var ingUnitNorm = normUnit(ingUnit);
  // 同義語グループで一致する場合はそのまま計算（換算比1:1）
  if(riUnitNorm === ingUnitNorm && riUnit !== ingUnit){
    return parseFloat(ing.unitPrice) * a;
  }
  // 正規化後の単位で換算テーブルも検索できるようriUnitを更新
  if(riUnitNorm !== riUnit) riUnit = riUnitNorm;

  if(riUnit && ingUnit && riUnit !== ingUnit) {
    // 基本単位変換: riUnit→ingUnitへ変換してからunitPrice掛け算
    var basicConverted = false;
    // [ingUnit, riUnit, riToIngFactor]: a_ing = a_ri * factor
    var pairs = [
      ['kg','g',0.001],  // ingがkg、レシピがg → g*0.001=kg
      ['g','kg',1000],   // ingがg、レシピがkg → kg*1000=g
      ['l','ml',0.001],['ml','l',1000],
      ['l','cc',0.001],['cc','l',1000],
      ['ml','cc',1],['cc','ml',1]
    ];
    for(var pi=0;pi<pairs.length;pi++){
      if(ingUnit===pairs[pi][0] && riUnit===pairs[pi][1]){
        a=a*pairs[pi][2]; basicConverted=true; break;
      }
    }
    if(!basicConverted){
      var convs = ing.unitConversions || [];
      // {unit:'大さじ',amount:15}=1大さじ=15ingUnit → a_ing=a_ri*15
      var convDirect = convs.find(function(uc){ return uc.unit === riUnit; });
      if(convDirect && convDirect.amount>0){
        // g/ml系はingUnitの量を求める（除算）: {unit:'g',amount:200}=1ingUnit=200g → a_ing=a_g/200
        // 大さじ等はingUnitに変換（乗算）: {unit:'大さじ',amount:15}=1大さじ=15ingUnit → a_ing=a*15
        if(riUnit==='g'||riUnit==='ml'||riUnit==='kg'||riUnit==='l'||riUnit==='cc'){
          a = a / convDirect.amount;
        } else {
          a = a * convDirect.amount;
        }
      } else if(!convDirect){
        // カウント系食材をg/mlで指定: {unit:'g',amount:200}=1ingUnit=200g → a_ing=a_g/200
        var gConv  = convs.find(function(uc){ return uc.unit==='g'  && uc.amount>0; });
        var mlConv = convs.find(function(uc){ return uc.unit==='ml' && uc.amount>0; });
        if(riUnit==='g'  && gConv)  a = a / gConv.amount;
        else if(riUnit==='ml' && mlConv) a = a / mlConv.amount;
      }
    }
  }
  return parseFloat(ing.unitPrice) * a;
}


// サブレシピの単価計算（出来上がり量あたりの原価）
function calcSubRecipeUnitPrice(recipe){
  if(!recipe) return 0;
  var totalCost = calcRecipeCost(recipe);
  if(!totalCost) return 0;
  var yieldAmt = parseFloat(recipe.yield || 0);
  if(yieldAmt <= 0){
    // 出来上がり量未設定でも「何人分」があれば人分で計算
    var servings = parseFloat(recipe.servings || 0);
    if(servings > 0) return totalCost / servings; // 1人分あたりの原価
    return 0;
  }
  var yieldUnit = (recipe.yieldUnit||'').trim();
  return totalCost / yieldAmt; // 出来上がり量1単位あたりの原価
}

// サブレシピを指定単位で使用する際の原価計算
function calcSubRecipeCostByUnit(recipe, amount, unit){
  if(!recipe || !amount) return 0;
  var amt = parseFloat(amount)||0;
  if(amt <= 0) return 0;
  var totalCost = calcRecipeCost(recipe);
  var yieldAmt = parseFloat(recipe.yield||0);
  var yieldUnit = (recipe.yieldUnit||'').trim();
  var servings = parseFloat(recipe.servings||0);
  var unitNorm = (unit||'').trim();

  // 人分・人前で使う場合
  if(['人分','人','人前','portion'].includes(unitNorm)){
    if(servings > 0) return totalCost / servings * amt;
    if(yieldAmt > 0) return totalCost / yieldAmt * amt;
    return 0;
  }
  // 個・切れ・枚などの場合
  // ただし yieldUnit と一致する場合は出来上がり量で割る（例: ドライトマト240枚→5枚）
  if(['個','切れ','枚','本','杯','皿','袋','パック'].includes(unitNorm)){
    if(yieldAmt > 0 && yieldUnit === unitNorm) return totalCost / yieldAmt * amt;
    if(servings > 0) return totalCost / servings * amt;
    return 0;
  }
  // g・mlなどの重量/容量 → 出来上がり量で割る
  if(yieldAmt > 0){
    // 単位変換（ml⇔cc など）
    var yieldNorm = yieldUnit;
    var convAmt = amt;
    if(unitNorm==='cc' && (yieldNorm==='ml'||yieldNorm==='cc')) convAmt = amt;
    else if(unitNorm==='ml' && yieldNorm==='cc') convAmt = amt;
    else if(unitNorm==='kg' && yieldNorm==='g') convAmt = amt*1000;
    else if(unitNorm==='g' && yieldNorm==='kg') convAmt = amt/1000;
    else if(unitNorm==='l' && (yieldNorm==='ml'||yieldNorm==='cc')) convAmt = amt*1000;
    return totalCost / yieldAmt * convAmt;
  }
  // 出来上がり量未設定の場合は人分で
  if(servings > 0) return totalCost / servings * amt;
  return 0;
}

function calcRecipeCost(recipe) {
  if (!recipe.ingredients || !recipe.ingredients.length) return 0;
  return recipe.ingredients.reduce(function(sum, ri) {
    if(ri._isSection) return sum;
    if(ri._subRecipeId){
      var subR=DB.recipes.find(function(r){return r.id===ri._subRecipeId;});
      if(!subR) return sum;
      var subAmt=parseFloat(ri.amount||0);
      if(isNaN(subAmt)) return sum;
      return sum+calcSubRecipeCostByUnit(subR,subAmt,ri.unit);
    }
    var ing = DB.ingredients.find(function(i){return i.id === ri.ingredientId;});
    if (!ing || ing.unitPrice===null || ing.unitPrice===undefined || ing.unitPrice==='') return sum;
    var amount = parseFloat(ri.amount||0);
    if(isNaN(amount)) return sum;
    var riUnit = (ri.unit||'').trim();
    var ingUnit = (ing.unit||'').trim();
    if(riUnit && ingUnit && riUnit !== ingUnit){
      var np=[['kg','g',1000],['g','kg',0.001],['l','ml',1000],['ml','l',0.001],['l','cc',1000],['cc','l',0.001]];
      var done=false;
      for(var p=0;p<np.length;p++){
        if(ingUnit===np[p][0]&&riUnit===np[p][1]){amount*=np[p][2];done=true;break;}
        if(ingUnit===np[p][1]&&riUnit===np[p][0]){amount/=np[p][2];done=true;break;}
      }
      if(!done && ing.unitConversions && ing.unitConversions.length){
        var conv=ing.unitConversions.find(function(uc){return uc.unit===riUnit;});
        if(conv && conv.amount>0) amount=amount/conv.amount;
      }
    }
    return sum + (parseFloat(ing.unitPrice) * amount);
  }, 0);
}
function calcCostRatio(cost, price) {
  if (!price || price === 0) return null;
  return (cost/price*100).toFixed(1);
}
function costRatioClass(r) {
  if (!r) return '';
  return r <= 30 ? 'cost-ratio-good' : r <= 40 ? 'cost-ratio-warn' : 'cost-ratio-bad';
}
// Tax helpers
function taxIncl(priceExcl) { return priceExcl * (1+TAX_RATE); }
function taxExcl(priceIncl) { return priceIncl / (1+TAX_RATE); }

function recipeCardHTML(r) {
  var cost = calcRecipeCost(r);
  var servings = parseFloat(r.servings||0);
  var ratio = r.price ? calcCostRatio(cost,r.price) : null;

  // 問題チェック
  var hasUnpriced = (r.ingredients||[]).some(function(fi){
    if(fi._isSection) return false;
    var ing=DB.ingredients.find(function(i){return i.id===fi.ingredientId;});
    return fi.ingredientId&&(!ing||!ing.unitPrice||parseFloat(ing.unitPrice||0)<=0);
  });
  var noServings = servings <= 0;
  var perPersonCost = (servings>0 && cost>0) ? Math.round(cost/servings) : 0;

  var allergenHtml = '';
  if(r.allergens && r.allergens.length){
    allergenHtml = '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px">'
      + r.allergens.slice(0,6).map(function(id){
          var a=ALLERGENS.find(function(x){return x.id===id;});

        }).join('')

      + '</div>';
  }
  var photoHtml = r.photo ? '<img src="'+r.photo+'" style="width:100%;height:100%;object-fit:cover">' : '<span style="font-size:36px;color:var(--greige)">🍽</span>';
  var tagHtml = (r.tags&&r.tags.length) ? '<span>🏷 '+r.tags.slice(0,2).join(', ')+'</span>' : '';

  var costHtml = '';
  if(cost>0||hasUnpriced){
    costHtml = '<div class="recipe-card-cost">'
      + '<span class="cost-badge">原価 '+(cost>0?formatYen(cost):'¥?')+(hasUnpriced?'<span style="color:#f0a500;font-size:10px"> +α</span>':'')+'</span>'
      + (ratio&&cost>0 ? '<span class="'+costRatioClass(ratio)+'">'+ratio+'%</span>' : '')

    warningHtml += '<span style="font-size:10px;background:#f0a500;color:#fff;border-radius:3px;padding:1px 5px">単価未登録あり</span>';
  }

  var cardBorder = noServings ? 'border-left:3px solid #e74c3c;' : (hasUnpriced ? 'border-left:3px solid #f0a500;' : '');

  return '<div class="recipe-card" onclick="viewRecipe(\''+r.id+'\')"\'  style="'+cardBorder+'">'
    + '<div class="recipe-card-img">'
    + photoHtml
    + '<button class="recipe-card-fav" onclick="event.stopPropagation();toggleFav(\''+r.id+'\')">'+(r.favorite?'❤️':'🤍')+'</button>'

function renderRecipesGrid() {
  var q = recipeFilter.search;
  var baseRecipes = isStaffMode ? DB.recipes.filter(function(r){return r.staffVisible!==false;}) : DB.recipes;
  var filtered = baseRecipes.filter(function(r){
    if (q) {
      var mn=searchMatch(r.name, q);
      var mt=(r.tags||[]).some(function(t){return searchMatch(t, q);});
      var mi=(r.ingredients||[]).some(function(ri){
        var ing=DB.ingredients.find(function(i){return i.id===ri.ingredientId;});
        return ing&&searchMatch(ing.name, q);
      });
      var mp=false;
      if(r.parentId){var par=DB.recipes.find(function(p){return p.id===r.parentId;});mp=par&&searchMatch(par.name,q);}
      if(!mn&&!mt&&!mi&&!mp) return false;
    }
    if (recipeFilter.category && r.category!==recipeFilter.category) return false;
    if (recipeFilter.position && r.coursePosition!==recipeFilter.position) return false;
    if (recipeFilter.tag && !(r.tags||[]).includes(recipeFilter.tag)) return false;
    return true;
  });
  // updated_at 新しい順にソート
  filtered.sort(function(a,b){
    var ta = a.updated_at||a.created_at||'';
    var tb = b.updated_at||b.created_at||'';
    return tb.localeCompare(ta);
  });
  var c = document.getElementById('recipe-grid-container');
  if (!c) return;
  if (!filtered.length) {
    c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>レシピが見つかりません</h3></div>';
    return;
  }
  // 親子グループ表示
  // 検索中はフラット表示
  if (q) {
    c.innerHTML = '<div class="recipe-grid">'+filtered.map(function(r){return recipeCardHTML(r);}).join('')+'</div>';
    return;
  }
  // 通常表示: 親・単独レシピのみ。子レシピは親カードの下に表示
  var parents = filtered.filter(function(r){return !r.parentId;});
  var children = DB.recipes.filter(function(r){return !!r.parentId;});
  // 子を持たない孤立した子レシピ（親がfilteredにいない場合）はflatで表示
  var html = '';
  parents.forEach(function(r){
    var kids = children.filter(function(c){return c.parentId===r.id;});
    html += recipeCardHTML(r);
    if (kids.length) {
      html += '<div style="grid-column:1/-1;margin:0 0 4px 0">'
        + '<div style="font-size:11px;color:var(--text-muted);padding:4px 8px;display:flex;align-items:center;gap:6px">'
        + '<span style="flex:1;height:1px;background:var(--border)"></span>'
        + '<span>↳ 仕込み・下ごしらえ（'+r.name+'）</span>'
        + '<span style="flex:1;height:1px;background:var(--border)"></span>'
        + '</div>'
        + '<div class="recipe-grid" style="margin:0 0 16px 24px;padding:8px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--border)">'
        + kids.map(function(k){return recipeCardHTML(k);}).join('')
        + '</div></div>';
    }
  });
  // 親がfilteredにいない孤立子レシピ
  var orphans = children.filter(function(c){return !parents.find(function(p){return p.id===c.parentId;});});
  if (orphans.length) {
    html += orphans.map(function(r){return recipeCardHTML(r);}).join('');
  }
  c.innerHTML = '<div class="recipe-grid">'+html+'</div>';
}

// ========== RECIPE DETAIL ==========
function viewRecipe(id, scale) {
  scale = parseFloat(scale)||1;
  var r = DB.recipes.find(function(x){return x.id===id;});
  if (!r) return;
  // 栄養素計算
  var nutr=calcRecipeNutrition(r);
  var hasNutr=nutr.kcal>0||nutr.protein>0;
  var nutritionViewHtml=hasNutr
    ?'<div style="margin-top:12px">'
      +'<button onclick="var e=document.getElementById(\'rv-nutrition\');e.style.display=e.style.display===\'none\'?\'block\':\'none\'" '
      +'style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text-muted);margin-bottom:6px">🥗 栄養素を表示/非表示</button>'
      +'<div id="rv-nutrition" style="display:none">'+nutritionHTML(nutr,r.servings||1)+'</div>'
      +'</div>'
    :'';
  // 食事制限
  var dietInfo=calcDietInfo(r.ingredients||[]);
  var dietHtml=dietInfo.length
    ?'<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">'
      +dietInfo.map(function(d){return '<span style="font-size:12px;padding:3px 8px;border-radius:12px;background:'+d.color+'22;color:'+d.color+';font-weight:600">'+d.label+'</span>';}).join('')
      +'</div>'
    :'';

  var cost = 0; // ingRowsで実際に表示した原価の合計を使う
  var ingRows = (r.ingredients||[]).map(function(ri){
    if(ri._isSection){
      return '<tr><td colspan="3" style="padding:8px 4px 4px;font-weight:600;color:var(--text-light);border-bottom:2px solid var(--accent);font-size:13px">'+(ri._sectionLabel||'')+'</td></tr>';
    }
    var ing = DB.ingredients.find(function(i){return i.id===ri.ingredientId;});
    var subR = ri._subRecipeId ? DB.recipes.find(function(x){return x.id===ri._subRecipeId;}) : null;
    var name = subR ? '<span style="color:var(--accent-dark);cursor:pointer;text-decoration:underline" onclick="event.stopPropagation();viewRecipe(\''+subR.id+'\')">📖 '+subR.name+'</span>' : (ri._searchName || (ing ? ing.name : '不明'));
    var scaledAmt = ri.amount ? Math.round(parseFloat(ri.amount)*scale*100)/100 : '';
    var c = subR ? calcSubRecipeUnitPrice(subR)*parseFloat(ri.amount||0)*scale : (ing ? calcIngCost(ing,ri.amount*scale,ri.unit) : 0);
    cost += c;
    var amtDisplay = scaledAmt!=='' ? scaledAmt : ri.amount;
    return '<tr><td>'+name+'</td>'
      +'<td class="td-num">'+amtDisplay+' '+(ri.unit||(ing?ing.unit:''))+'</td>'
      +'<td class="td-num">'+(c>0?formatYen(c):'-')+'</td></tr>';
  }).join('');
  var steps = (r.steps||[]).reduce(function(acc,s){

// サブレシピを再帰的に辿ってアレルゲンを収集
function collectAllergensFromIngredients(ingredients, visited){
  visited = visited || new Set();
  var allergens = new Set();
  var dietFlags = new Set();
  (ingredients||[]).forEach(function(fi){
    // 食材DBのアレルゲン
    var ing = DB.ingredients.find(function(i){return i.id===fi.ingredientId;});
    if(ing){
      (ing.allergens||[]).forEach(function(a){allergens.add(a);});
      (ing.dietFlags||[]).forEach(function(f){dietFlags.add(f);});
    }
    // サブレシピのアレルゲン（再帰）
    if(fi._subRecipeId && !visited.has(fi._subRecipeId)){
      visited.add(fi._subRecipeId);
      var subR = DB.recipes.find(function(r){return r.id===fi._subRecipeId;});
      if(subR){
        // サブレシピに登録済みアレルゲンがあればそれを使う
        (subR.allergens||[]).forEach(function(a){allergens.add(a);});
        // さらにサブレシピの食材からも再帰的に収集
        var sub = collectAllergensFromIngredients(subR.ingredients, visited);
        sub.allergens.forEach(function(a){allergens.add(a);});
        sub.dietFlags.forEach(function(f){dietFlags.add(f);});
      }
    }
  });
  return {allergens: allergens, dietFlags: dietFlags};
}

function calcDietInfo(ingredients){
  // 食材のdietFlagsから食事制限を判定（サブレシピも再帰）
  var result = collectAllergensFromIngredients(ingredients);
  var flags = result.dietFlags;
  var result=[];
  if(!flags.has('meat')&&!flags.has('fish')&&!flags.has('dairy')&&!flags.has('egg'))
    result.push({label:'🌱 ヴィーガン',color:'#2e7d32'});
  else if(!flags.has('meat')&&!flags.has('fish'))
    result.push({label:'🥚 ベジタリアン',color:'#558b2f'});
  else if(!flags.has('meat'))
    result.push({label:'🐟 ペスカタリアン',color:'#0277bd'});
  if(!flags.has('gluten'))
    result.push({label:'🌾 グルテンフリー',color:'#ef6c00'});
  return result;
}

function switchRecipeTab(tab,el) {
  document.querySelectorAll('.modal-body .tab').forEach(function(t){t.classList.remove('active');});
  // elがnullの場合はdata属性で対象タブを探す
  var activeTab = el || document.querySelector('.modal-body .tab[onclick*=\'"'+tab+'"\'\']') || document.querySelector('.modal-body .tab[onclick*="'+tab+'"]');
  if(activeTab) activeTab.classList.add('active');
  ['basic','ingredients','steps','allergens','photo'].forEach(function(t){
    var e=document.getElementById('recipe-tab-'+t);
    if(e) e.classList.toggle('hidden',t!==tab);
  });
  if(tab==='ingredients') renderIngredientRows();
  if(tab==='steps') renderStepRows();
  if(tab==='allergens') renderAllergenGrid();
}

// 保存した基本情報をフォームに復元
function restoreRecipeBasicInfo(info){
  if(!info) return;
  var fields = {
    'rf-name': info.name, 'rf-category': info.category,
    'rf-shape': info.shape, 'rf-cooktime': info.cookTime,
    'rf-difficulty': info.difficulty, 'rf-yield': info.yield,
    'rf-yield-unit': info.yieldUnit, 'rf-per-serving': info.perServing,
    'rf-per-serving-unit': info.perServingUnit,
    'rf-position': info.coursePosition, 'rf-servings': info.servings,
    'rf-desc': info.description, 'rf-notes': info.notes,
    'rf-storage': info.storage, 'rf-source': info.source,
  };
  Object.keys(fields).forEach(function(id){
    var el = document.getElementById(id);
    if(el && fields[id] !== undefined) el.value = fields[id];
  });
}

function openNewIngredientFromRecipe(name, idx){

    newIngIdx:idx
  };
  closeModal();

        renderStepRows();

}

  // 元の食材IDをnewIngIdに差し替え
  var idx=saved.ingredients.findIndex(function(fi){return fi.ingredientId===saved.origIngId;});

    saved.ingredients[idx].unit=newIng.unit;
    saved.ingredients[idx]._searchName=newIng.name;

  window._pendingRecipeEdit=null;

    openRecipeForm(saved.id);

function calcYieldFromIngredients(){
  // 材料の合計重量/容量を計算
  var totalG = 0;   // g系
  var totalMl = 0;  // ml/cc系
  var totalOther = 0; // その他（個・本など）
  var hasLiquid = false;
  var hasSolid = false;

  var skippedItems = [];
  formIngredients.forEach(function(fi){
    if(fi._isSection) return;
    var amt = parseAmount(fi.amount);
    if(amt <= 0) return;
    var unit = normUnit((fi.unit||'').trim().toLowerCase());
    var ing = DB.ingredients.find(function(i){return i.id===fi.ingredientId;});

    // レシピ単位が直接g/kg/ml系の場合はingの基本単位に関わらずそのまま加算
    if(['g','kg','グラム'].includes(unit)){
      var gVal = unit==='kg' ? amt*1000 : amt;
      totalG += gVal;
      hasSolid = true;
      return;
    }
    if(['ml','cc','l','リットル','dl'].includes(unit)){
      var mlVal = unit==='l'||unit==='リットル' ? amt*1000 : unit==='dl' ? amt*100 : amt;
      totalMl += mlVal;
      hasLiquid = true;
      return;
    }

    // 換算テーブルでg/mlに変換試みる
    // 新UI形式: {unit:'大さじ', amount:15} = 1大さじ=15ml
    //           {unit:'本',    amount:150} = 1本=150g
    var baseUnit = ing ? normUnit((ing.unit||'').trim().toLowerCase()) : unit;
    var convAmt = amt;

    if(ing && ing.unitConversions && ing.unitConversions.length){
      // レシピ単位でunitConversionsを検索
      // 例: レシピが「大さじ」で{unit:'大さじ',amount:15} → 1大さじ=15ml
      var convByUnit = ing.unitConversions.find(function(uc){
        return (uc.unit||'').toLowerCase() === unit;
      });
      if(convByUnit && convByUnit.amount > 0){
        convAmt = amt * convByUnit.amount;
        // convByUnit.amountの単位は基本単位（baseUnit）
      } else if(unit !== baseUnit) {
        // 旧形式互換: amount<1の場合は逆数で補正
        var convOld = ing.unitConversions.find(function(uc){
          return (uc.unit||'').toLowerCase() === unit && uc.amount < 1;
        });
        if(convOld && convOld.amount > 0) convAmt = amt * (1/convOld.amount);
      }

      // 基本単位がg/ml系でない場合：g/mlへの換算を探す
      if(!['g','kg','グラム','ml','cc','l','リットル','dl'].includes(baseUnit)){
        // {unit:'g', amount:150} = 1本=150g → baseUnit='本'の時にg換算を探す
        var convToG = ing.unitConversions.find(function(uc){
          return ['g','グラム'].includes((uc.unit||'').toLowerCase()) && uc.amount > 0;
        });
        var convToMl = ing.unitConversions.find(function(uc){
          return ['ml','cc'].includes((uc.unit||'').toLowerCase()) && uc.amount > 0;
        });
        if(convToG){
          var gPerBase = convToG.amount >= 1 ? convToG.amount : 1/convToG.amount;
          convAmt = convAmt * gPerBase;
          baseUnit = 'g';
        } else if(convToMl){
          var mlPerBase = convToMl.amount >= 1 ? convToMl.amount : 1/convToMl.amount;
          convAmt = convAmt * mlPerBase;
          baseUnit = 'ml';
        }
      }
    }

    // g系
    if(['g','kg','グラム'].includes(baseUnit)){
      var gVal = baseUnit==='kg' ? convAmt*1000 : convAmt;
      totalG += gVal;
      hasSolid = true;
    }
    // ml/cc系（液体）
    else if(['ml','cc','l','リットル','dl'].includes(baseUnit)){
      var mlVal = baseUnit==='l'||baseUnit==='リットル' ? convAmt*1000
               : baseUnit==='dl' ? convAmt*100 : convAmt;
      totalMl += mlVal;
      hasLiquid = true;
    }
    // 大さじ・小さじ
    else if(['大さじ','大'].includes(unit)){
      totalMl += amt * 15;
      hasLiquid = true;
    }
    else if(['小さじ','小'].includes(unit)){
      totalMl += amt * 5;
      hasLiquid = true;
    }
    else if(['カップ','cup'].includes(unit)){
      totalMl += amt * 200;
      hasLiquid = true;
    }
    else {
      // 換算できなかった材料を記録
      if(ing) skippedItems.push(ing.name + '(' + (fi.unit||ing.unit) + ')');
    }
  });

  var yieldEl = document.getElementById('rf-yield');
  var unitEl = document.getElementById('rf-yield-unit');
  var hintEl = document.getElementById('rf-yield-hint');

  var total = 0;
  var unit = '';
  var hint = '';

  if(hasLiquid && hasSolid){
    // 液体＋固体が混在 → g換算で合計（液体はml≈g）
    total = Math.round(totalG + totalMl);
    unit = 'g';
    hint = '液体('+Math.round(totalMl)+'ml) + 固体('+Math.round(totalG)+'g) の合計です。液体レシピならmlに変更してください。';
  } else if(hasLiquid){
    total = Math.round(totalMl);
    unit = 'ml';
    hint = '液体合計: '+total+'ml';
  } else if(hasSolid){
    total = Math.round(totalG);
    unit = 'g';
    hint = '固体合計: '+total+'g';
  } else {
    if(hintEl) hintEl.textContent = '⚠️ g・ml・ccで登録された食材が見つかりません';
    return;
  }

  if(yieldEl) yieldEl.value = total;
  if(unitEl && !unitEl.value) unitEl.value = unit;
  updatePerServingHint();
  if(hintEl){
    var servings = parseFloat(document.getElementById('rf-servings')?.value||0);
    var perServing = servings > 0 ? Math.round(total/servings*10)/10 : null;
    var skipMsg = skippedItems.length ? ' ／ ⚠️ 換算できず除外: ' + skippedItems.join('、') : '';
    hintEl.textContent = '✅ ' + hint + (perServing ? '（1人分: '+perServing+(unit)+')' : '') + skipMsg;
  }
}

    }

        : '<span style="color:#f0a500;font-size:10px">単価未登録</span>';
      return '<div style="padding:5px 8px;font-size:12px;border-bottom:1px solid var(--border);background:'+(selected?'rgba(168,197,172,0.3)':'#f8fff8')+'">'        +'<div style="display:flex;justify-content:space-between;align-items:center;gap:4px">'        +'<span onclick="linkIngredient('+idx+',\''+ci.id+'\',\'ing\')" style="flex:1;cursor:pointer;font-weight:'+(selected?'600':'400')+'">'+(selected?'✓ ':'')+ci.name+'</span>'        +priceInfo        +'<span onclick="editIngFromRecipe(\''+ci.id+'\','+idx+')" style="flex-shrink:0;font-size:10px;color:var(--text-muted);cursor:pointer;padding:1px 4px;border:1px solid var(--border);border-radius:3px" title="編集してレシピに戻る">✏️</span>'        +'</div>'        +subLine        +'</div>';

    }).join('');
  }

  if(!html){
    html = '<div style="padding:6px 8px;font-size:12px;color:var(--text-muted)">名前を入力すると候補が出ます</div>';
  }

  panel.innerHTML = html;
}

function linkIngredient(idx, id, type){
  formIngredients[idx]._candidateSearch = '';
  if(type === 'recipe'){
    // レシピから原価引用
    var r = DB.recipes.find(function(x){ return x.id === id; });
    if(!r) return;
    formIngredients[idx]._subRecipeId = id;
    formIngredients[idx].ingredientId = '';
    if(!formIngredients[idx].unit) formIngredients[idx].unit = '人分';
  } else {
    // 食材DB
    var ing = DB.ingredients.find(function(i){ return i.id === id; });
    if(!ing) return;
    formIngredients[idx].ingredientId = id;
    formIngredients[idx]._subRecipeId = '';
    // 食材名は変更しない（_searchNameはそのまま）
    if(!formIngredients[idx].unit) formIngredients[idx].unit = ing.unit || '';
  }
  // 候補検索ボックスをクリア
  var row = document.querySelector('.ingredient-row[data-idx="'+idx+'"]');
  if(row){
    var searchInput = row.querySelector('input[placeholder*="食材DB検索"]');
    if(searchInput) searchInput.value = '';
    // costDisplayだけ即時更新
    var ing2 = formIngredients[idx].ingredientId ? DB.ingredients.find(function(i){return i.id===formIngredients[idx].ingredientId;}) : null;
    var subR2 = formIngredients[idx]._subRecipeId ? DB.recipes.find(function(r){return r.id===formIngredients[idx]._subRecipeId;}) : null;
    var rc2 = subR2 ? (typeof calcSubRecipeCostByUnit==='function'?calcSubRecipeCostByUnit(subR2,formIngredients[idx].amount,formIngredients[idx].unit):0) : (ing2?calcIngCost(ing2,formIngredients[idx].amount,formIngredients[idx].unit):0);
    var costEl = row.querySelector('.ingredient-cost-display');
    if(costEl){
      var subUP2 = subR2&&typeof calcSubRecipeUnitPrice==='function'?calcSubRecipeUnitPrice(subR2):0;
      var hasP2 = (subR2&&subUP2>0)||(ing2&&ing2.unitPrice!==null&&ing2.unitPrice!==undefined&&ing2.unitPrice!=='');
      costEl.textContent = rc2>0 ? formatYen(rc2) : (subR2?(subUP2===0?'出来上がり量未設定':'-'):'-');
    }
  }
  updateCandidatePanel(idx);
  updateCostPreview();
}

  updateCostPreview();
}

function initDragSort(){

  if(!list) return;

  var dragging = null;

  rows.forEach(function(row){
    row.setAttribute('draggable','true');
    row.addEventListener('dragstart',function(e){
      dragging = row;
      setTimeout(function(){row.style.opacity='0.4';},0);
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragend',function(){
      row.style.opacity='1';
      dragging = null;
      // DOM順にformIngredientsを並び替え
      var newOrder=[];
      list.querySelectorAll('.ingredient-row').forEach(function(r){
        var idx=parseInt(r.dataset.idx);
        if(!isNaN(idx)) newOrder.push(formIngredients[idx]);
      });
      formIngredients.length=0;
      newOrder.forEach(function(fi){formIngredients.push(fi);});
      renderIngredientRows();
      initDragSort();
    });
    row.addEventListener('dragover',function(e){
      e.preventDefault();
      if(!dragging||dragging===row) return;
      var rect=row.getBoundingClientRect();
      var mid=rect.top+rect.height/2;
      if(e.clientY<mid){
        list.insertBefore(dragging,row);
      } else {
        list.insertBefore(dragging,row.nextSibling);
      }
    });
  });
}

function updateCostPreview(){
  const el=document.getElementById('rf-cost-preview');if(!el)return;
  const cost=formIngredients.reduce((s,fi)=>{const ing=DB.ingredients.find(i=>i.id===fi.ingredientId);if(!ing) return s;const subR=fi._subRecipeId?DB.recipes.find(r=>r.id===fi._subRecipeId):null;const subPrice=subR&&typeof calcSubRecipeCostByUnit==='function'?calcSubRecipeCostByUnit(subR,fi.amount,fi.unit):(subR?calcSubRecipeUnitPrice(subR)*parseFloat(fi.amount||0):0);return s+(subR?subPrice:calcIngCost(ing,fi.amount,fi.unit));},0);

  // 換算未登録チェック
  var noConvItems = [];
  formIngredients.forEach(function(fi){
    if(fi._isSection) return;
    var ing = DB.ingredients.find(function(i){return i.id===fi.ingredientId;});
    if(!ing || ing.unitPrice===null || ing.unitPrice===undefined || ing.unitPrice==='') return;
    if(fi._subRecipeId) return;
    var ingBaseUnit = (ing.unit||'').trim();
    var riUnit = (fi.unit||'').trim();
    if(!riUnit || riUnit===ingBaseUnit) return;
    var basicPairs = ['g/kg','kg/g','ml/l','l/ml','cc/ml','ml/cc','cc/l','l/cc'];
    if(basicPairs.indexOf(riUnit+'/'+ingBaseUnit)>=0 || basicPairs.indexOf(ingBaseUnit+'/'+riUnit)>=0) return;
    var convs = ing.unitConversions || [];
    if(!convs.some(function(c){return c.unit===riUnit;})){
      var nm = fi._searchName || ing.name || '';
      noConvItems.push(nm+'（'+riUnit+'）');
    }
  });

  if(noConvItems.length > 0){
    el.innerHTML=`推定原価: <strong style="color:#e65100">${formatYen(cost)}</strong> <span style="font-size:11px;color:#e65100;background:#fff3e0;padding:2px 6px;border-radius:4px">⚠️ 換算未登録: ${noConvItems.join('、')}</span>`;
  } else {
    el.innerHTML=`推定原価: <strong>${formatYen(cost)}</strong>`;
  }
}

function renderStepRows(){

    var text = typeof s === 'object' ? (s.text||'') : s;
    var isSection = typeof s === 'object' && s._isSection;
    if(isSection){
      stepNum = 0; // セクション後は番号リセット
      return '<div class="step-row" style="align-items:center">'        +'<div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">'        +'<button class="btn btn-secondary btn-sm btn-icon" style="font-size:10px;padding:1px 4px" onclick="moveStep('+i+',-1)">▲</button>'        +'<div style="color:var(--text-muted);font-size:12px;text-align:center">§</div>'        +'<button class="btn btn-secondary btn-sm btn-icon" style="font-size:10px;padding:1px 4px" onclick="moveStep('+i+',1)">▼</button>'        +'</div>'        +'<input type="text" value="'+(s.label||'')+'" placeholder="【セクション名】例：下準備・仕上げ" '        +'oninput="formSteps['+i+']=Object.assign({},formSteps['+i+'],{label:this.value})" '        +'style="flex:1;padding:5px 10px;border:none;border-bottom:2px solid var(--accent);background:transparent;font-size:13px;font-weight:600;color:var(--text-light);font-family:inherit">'        +'<button class="btn btn-secondary btn-sm btn-icon" style="margin-top:4px" onclick="removeStep('+i+')">✕</button>'        +'</div>';
    }

    return '<div class="step-row">'      +'<div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">'      +'<button class="btn btn-secondary btn-sm btn-icon" style="font-size:10px;padding:1px 4px" onclick="moveStep('+i+',-1)">▲</button>'      +'<div class="step-num">'+stepNum+'</div>'      +'<button class="btn btn-secondary btn-sm btn-icon" style="font-size:10px;padding:1px 4px" onclick="moveStep('+i+',1)">▼</button>'      +'</div>'      +'<textarea style="flex:1" rows="2" oninput="formSteps['+i+']=this.value" placeholder="手順 '+stepNum+'...">'+text+'</textarea>'      +'<button class="btn btn-secondary btn-sm btn-icon" style="margin-top:4px" onclick="removeStep('+i+')">✕</button>'      +'</div>';
  }).join('');

function moveStep(i, dir){
  var j = i + dir;
  if(j < 0 || j >= formSteps.length) return;
  var tmp = formSteps[i];
  formSteps[i] = formSteps[j];
  formSteps[j] = tmp;
  renderStepRows();
}
function addStep(){formSteps.push('');renderStepRows();}
function addStepSection(){formSteps.push({_isSection:true,label:'',text:''});renderStepRows();}
function removeStep(i){formSteps.splice(i,1);renderStepRows();}

      +(!isStaffMode&&dCostStr?'<div style="font-size:11px;color:var(--accent-dark);font-weight:600">'+dCostStr+'</div>':'')
      +(d.platingMemo?'<div style="font-size:12px;color:#2d6a4f;background:#f0faf0;border-left:3px solid var(--accent);padding:5px 8px;border-radius:0 6px 6px 0;margin-top:6px">📝 '+d.platingMemo+'</div>':'')
      +'</div></div>'
      +'</div>';
  }).join('');
  return '<div class="card" style="margin:0;overflow:hidden;position:relative'+(isStaffMode?';cursor:pointer':'')+'" '+(isStaffMode?'onclick="showCourseFullscreen(\''+c.id+'\')"':'')+'>'
    +(isStaffMode?'':'<button class="btn btn-sm no-print" style="position:absolute;top:10px;right:10px;background:transparent;color:#ccc;border:none;font-size:15px;padding:2px 6px;z-index:1" onclick="event.stopPropagation();deleteCourse(\''+c.id+'\')" title="削除">🗑</button>')
    +'<div style="padding:14px 16px 10px;border-bottom:1px solid var(--bg3)">'
    +'<div '+(isStaffMode?'':'onclick="openCourseForm(\''+c.id+'\')" style="cursor:pointer;padding-right:28px"')+'>'
    +'<div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.4">'+c.name+'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:baseline">'
    +'<span style="font-size:12px;color:var(--text-muted)">'+(c.dishes?c.dishes.length:0)+'品構成</span>'
    +(!isStaffMode&&totalCost?'<span style="font-size:12px;color:var(--accent-dark)">原価 '+formatYen(totalCost)+(c.price&&totalCost?(function(){var taxRate=parseFloat(c.taxType||10)/100;var excl=Math.round(c.price/(1+taxRate));var cr=Math.round(totalCost/excl*100);return ' <span style="color:'+(cr>35?'#c0392b':'#2d6a4f')+'">'+cr+'%</span>';})():'')+'</span>':'')
    +(!isStaffMode&&c.price?'<span style="font-size:12px;color:var(--accent-dark)">売価 '+formatYen(c.price)+'</span>':'')
    +'</div>'
    +'</div>'
    +'<div style="display:flex;gap:6px;margin-top:10px">'
    +'<button class="btn btn-sm no-print" style="background:#e65100;color:white;padding:4px 10px" onclick="event.stopPropagation();showAllergenModal(\''+c.id+'\')" >🥜 アレルゲン</button>'
    +'<button class="btn btn-sm no-print" style="background:var(--accent);color:white;padding:4px 10px" onclick="event.stopPropagation();printCourse(\''+c.id+'\')" >🖨 印刷</button>'
    +'</div></div>'
    +'<div style="padding:0 16px"></div>'
    +(function(){
      // アレルゲン収集
      var allergens = new Set();
      (c.dishes||[]).forEach(function(d){
        var recipes = d.isPlate
          ? (d.elements||[]).map(function(e){return DB.recipes.find(function(r){return r.id===e.recipeId;});}).filter(Boolean)
          : [DB.recipes.find(function(r){return r.id===d.recipeId;})].filter(Boolean);
        recipes.forEach(function(r){
          (r.allergens||[]).forEach(function(a){allergens.add(a);});
        });
      });
      var allergenLabels={'egg':'卵','milk':'乳','wheat':'小麦','shrimp':'えび','crab':'かに','peanut':'落花生','soba':'そば','abalone':'あわび','squid':'いか','salmon':'いくら','orange':'オレンジ','cashew':'カシューナッツ','kiwi':'キウイ','beef':'牛肉','walnut':'くるみ','sesame':'ごま','mackerel':'さば','soy':'大豆','chicken':'鶏肉','banana':'バナナ','pork':'豚肉','matsutake':'まつたけ','peach':'もも','yam':'やまいも','apple':'りんご','gelatin':'ゼラチン'};
      var allergenHtml = allergens.size > 0
        ? '<div style="padding:6px 12px;background:#fff8f0;border-top:1px solid var(--bg3);font-size:11px"><span style="color:var(--text-muted)">アレルゲン: </span>'
          + Array.from(allergens).map(function(a){return '<span style="background:#ffe0b2;color:#bf360c;border-radius:3px;padding:1px 5px;margin:1px">'+(allergenLabels[a]||a)+'</span>';}).join(' ')
          + '</div>'
        : '';
      // 栄養素
      var nutr = courseNutr;
      var nutrHtml = nutr.kcal > 0 && !isStaffMode
        ? '<div style="padding:6px 12px;background:var(--bg2);border-top:1px solid var(--bg3);font-size:11px;display:flex;gap:12px;flex-wrap:wrap;color:var(--text-muted)">'
          + '<span>🔥 <b>'+Math.round(nutr.kcal)+'</b>kcal</span>'
          + (nutr.protein?'<span>タンパク質 <b>'+Math.round(nutr.protein*10)/10+'</b>g</span>':'')
          + (nutr.fat?'<span>脂質 <b>'+Math.round(nutr.fat*10)/10+'</b>g</span>':'')
          + (nutr.carbs?'<span>炭水化物 <b>'+Math.round(nutr.carbs*10)/10+'</b>g</span>':'')
          + (nutr.salt?'<span>塩分 <b>'+Math.round(nutr.salt*10)/10+'</b>g</span>':'')
          + '</div>'
        : '';
      return allergenHtml + nutrHtml;
    })()
    +'</div>';
  } catch(e) {
    console.error('courseCardHTML error:', e, c);
    return '<div class="card" style="margin:0;padding:12px;color:#e74c3c">コース表示エラー: '+(c&&c.name||'')+'</div>';
  }
}
let editingCourseId=null, defaultCourseCategory='大人ディナーコース';

function openCourseForm(id, defaultCat) {
  editingCourseId=id||null;
  const c=id?DB.courses.find(c=>c.id===id):null;
  courseDishes=c?JSON.parse(JSON.stringify(c.dishes||[])):[];
  defaultCourseCategory=defaultCat||(c?c.courseCategory:'大人ディナーコース');

  const catOpts=COURSE_CATEGORIES.map(cat=>`<option value="${cat}" ${(c?c.courseCategory:defaultCourseCategory)===cat?'selected':''}>${cat}</option>`).join('');
  openModal(`
    <div class="modal-header">
      <div class="modal-title">${c?'コースを編集':'新規コース'}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid" style="margin-bottom:18px">
        <div class="form-group"><label>コースカテゴリ *</label><select class="form-control" id="cf-category">${catOpts}</select></div>
        <div class="form-group"><label>コース名 *</label><input type="text" id="cf-name" value="${c?c.name:''}" placeholder="例: ディナーコース A"></div>
        <div class="form-group full"><label>説明</label><input type="text" id="cf-desc" value="${c?c.description||'':''}" placeholder="コースの説明"></div>
        <div class="form-group full" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-radius:8px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;font-size:13px">
            <input type="checkbox" id="cf-archived" ${c&&c.archived?'checked':''} style="width:16px;height:16px">
            📦 アーカイブ（一覧に表示しない）
          </label>
        </div>
        <div class="form-group"><label>販売価格（円・税込）</label><input type="number" id="cf-price" value="${c?c.price||'':''}" min="0" placeholder="例: 8800"></div>
        <div class="form-group"><label>税率</label><select class="form-control" id="cf-tax-type"><option value="10" ${(!c||c.taxType==='10')?'selected':''}>10%</option><option value="8" ${(c&&c.taxType==='8')?'selected':''}>8%</option><option value="0" ${(c&&c.taxType==='0')?'selected':''}>非課税</option></select></div>
      </div>
      <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
        <h3 style="font-family:'Cormorant Garamond',serif;font-size:16px">コース構成</h3>
        <div style="display:flex;gap:6px">
          <button class="btn btn-secondary btn-sm" onclick="addCourseDish()">＋ 単品追加</button>
          <button class="btn btn-secondary btn-sm" style="color:var(--accent-dark);border-color:var(--accent)" onclick="addCoursePlate()">🍽 プレート追加</button>
        </div>
      </div>
      <div id="cf-dishes-list"></div>
      <div id="cf-course-preview" style="margin-top:14px;padding:10px;background:var(--bg2);border-radius:8px;font-size:13px"></div>
    </div>
    <div class="modal-footer">
      ${c?'<button class="btn btn-danger btn-sm" onclick="deleteCourse(\''+c.id+'\')">🗑 削除</button>':''}
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCourse()">💾 保存</button>
    </div>`);
  renderCourseDishes(); updateCoursePreview();
}

function renderCourseDishes(){
  var el=document.getElementById('cf-dishes-list');if(!el)return;
  el.innerHTML=courseDishes.map(function(d,i){

    if(d.isPlate){
      var posOpts='<option value="">ポジション</option>'+COURSE_POSITIONS().map(function(p){
        return '<option value="'+p+'" '+(d.position===p?'selected':'')+'>'+p+'</option>';
      }).join('');

      var elemRows=(d.elements||[]).map(function(e,j){
        var unitOpts=['人分','g','ml','個','枚','切れ','本','杯','袋'].map(function(u){
          return '<option value="'+u+'" '+(e.unit===u?'selected':'')+'>'+u+'</option>';
        }).join('');

        var eType = e._type || (e.ingredientId ? 'ingredient' : 'recipe');
        var selRec = eType==='recipe' && e.recipeId ? DB.recipes.find(function(r){return r.id===e.recipeId;}) : null;
        var selIng = eType==='ingredient' && e.ingredientId ? DB.ingredients.find(function(g){return g.id===e.ingredientId;}) : null;
        var elemId = 'cp-elem-'+i+'-'+j;
        var selectedName = selRec ? selRec.name : (selIng ? selIng.name : '');
        var borderColor = (selRec||selIng) ? 'var(--accent-dark)' : 'var(--border)';

        var elemCost = 0;
        if(eType==='recipe' && selRec){
          elemCost = typeof calcSubRecipeCostByUnit==='function' ? calcSubRecipeCostByUnit(selRec,e.amount,e.unit) : 0;
        } else if(eType==='ingredient' && selIng && selIng.unitPrice){
          elemCost = calcIngCost(selIng, e.amount, e.unit);
        }
        var badgeId = 'cost-badge-'+i+'-'+j;
        var costBadge = '<span id="'+badgeId+'" style="font-size:10px;color:var(--accent-dark);white-space:nowrap'+(elemCost>0?'':';display:none')+'">'+( elemCost>0?formatYen(Math.round(elemCost)):'' )+'</span>';

        // タイプ切り替えをデータ属性で管理
        var typeOpts = '<option value="recipe"'+(eType==='recipe'?' selected':'')+'>📋 レシピ</option>'
                     + '<option value="ingredient"'+(eType==='ingredient'?' selected':'')+'>🥬 食材</option>';

        return '<div style="display:flex;gap:5px;align-items:center;margin-bottom:6px;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;flex-wrap:wrap">'
          +'<input type="text" value="'+(e.role||'')+'" placeholder="メモ" '
            +'oninput="courseDishes['+i+'].elements['+j+'].role=this.value" '
            +'style="width:55px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text-muted)">'
          +'<select data-pi="'+i+'" data-pj="'+j+'" '
            +'style="padding:3px 4px;border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--accent-dark)" '
            +'onchange="setPlateElemType(this)">'
            +typeOpts
          +'</select>'
          +'<div style="flex:1;min-width:130px;position:relative">'
            +'<input type="text" id="'+elemId+'" value="'+(selectedName||(e._freeName||''))+'" '
              +'placeholder="'+(eType==='recipe'?'レシピ名で検索...':'食材名で検索...')+'" autocomplete="off" '
              +'style="width:100%;padding:4px 8px;border:1px solid '+borderColor+';border-radius:4px;font-size:12px;box-sizing:border-box;background:'+(selectedName?'#f0faf0':'var(--white)')+'" '
              +'oninput="if((courseDishes['+i+'].elements['+j+']._type||\'recipe\')===\'ingredient\'){courseDishes['+i+'].elements['+j+']._freeName=this.value;showPlateIngSuggest('+i+','+j+',this.value);}else{showPlateElemSuggest('+i+','+j+',this.value);}" '
              +'onfocus="(courseDishes['+i+'].elements['+j+']._type||\'recipe\')===\'recipe\'?showPlateElemSuggest('+i+','+j+',this.value):showPlateIngSuggest('+i+','+j+',this.value)" '
              +'onblur="setTimeout(function(){hideIngSuggest();autoMatchPlateIng('+i+','+j+');},250)">'
            +(selectedName?'<button style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-muted);padding:2px" '
              +'onclick="clearPlateElem('+i+','+j+')">✕</button>':'')
          +'</div>'
          +(eType==='ingredient'&&!selIng&&(e._freeName||'').trim()?'<button style="font-size:10px;padding:2px 6px;background:#e8f5e9;border:1px solid var(--accent);border-radius:4px;cursor:pointer;color:var(--accent-dark);white-space:nowrap" '
            +'onclick="openIngredientFormFromCourse(\'plate\','+i+','+j+')">📥 DB登録</button>':'')
          +'<input type="number" value="'+(e.amount||'')+'" placeholder="量" min="0" step="0.1" '
            +'oninput="updateElemCostBadge('+i+','+j+',this.value)" '

          +'<select onchange="courseDishes['+i+'].elements['+j+'].unit=this.value;updateElemCostBadge('+i+','+j+',courseDishes['+i+'].elements['+j+'].amount)" '

          +'<select style="padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--accent-dark);background:var(--white)" onchange="courseDishes['+i+'].position=this.value">'+posOpts+'</select>'
          +'<input type="text" value="'+(d.plateName||'')+'" placeholder="プレート名" oninput="courseDishes['+i+'].plateName=this.value" style="flex:1;padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px">'
          +'<button style="background:none;border:none;cursor:pointer;font-size:16px;color:#ccc;padding:2px;flex-shrink:0" onmouseover="this.style.color=\'#e74c3c\'" onmouseout="this.style.color=\'#ccc\'" onclick="courseDishes.splice('+i+',1);renderCourseDishes();updateCoursePreview()">✕</button>'

        +'</div>'
        +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'

          +'<label style="font-size:11px;color:var(--text-muted);cursor:pointer;margin-left:auto">📸 写真<input type="file" accept="image/*" style="display:none" onchange="setPlatePhoto('+i+',this)"></label>'

          +'style="width:100%;margin-top:8px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;resize:vertical;box-sizing:border-box;background:var(--bg)">'+(d.platingMemo||'')+'</textarea>'
        +'</div>';
    }

    // 単品（レシピ or 食材）
    var posOpts2='<option value="">サブカテゴリ</option>'+COURSE_POSITIONS().map(function(p){
      return '<option value="'+p+'" '+(d.position===p?'selected':'')+'>'+p+'</option>';
    }).join('');
    var dType=d._type||(d.ingredientId?'ingredient':'recipe');
    var selR=dType==='recipe'&&d.recipeId?DB.recipes.find(function(r){return r.id===d.recipeId;}):null;
    var selI=dType==='ingredient'&&d.ingredientId?DB.ingredients.find(function(x){return x.id===d.ingredientId;}):null;
    var selName=selR?selR.name:(selI?selI.name:'');
    var singleCost=0; var costLabel=''; var showAmt=false; var perPersonMode=false;

        +(selName?'<button style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-muted)" '
          +'onclick="courseDishes['+i+'].recipeId=\'\';courseDishes['+i+'].ingredientId=\'\';courseDishes['+i+']._freeName=\'\';courseDishes['+i+'].amount=\'\';renderCourseDishes();updateCoursePreview()">✕</button>':'')
      +'</div>'
      +(dType==='ingredient'&&!selI&&(d._freeName||'').trim()?'<button style="font-size:11px;padding:3px 8px;background:#e8f5e9;border:1px solid var(--accent);border-radius:5px;cursor:pointer;color:var(--accent-dark);white-space:nowrap" '
        +'onclick="openIngredientFormFromCourse(\'single\','+i+')">📥 DB登録</button>':'')

// プレート要素の原価バッジをリアルタイム更新
function renderCourseDishCost(idx){
  // 食材単品の数量変更時に即時原価を更新
  var d=courseDishes[idx];
  if(!d) return;
  var selI=d.ingredientId?DB.ingredients.find(function(x){return x.id===d.ingredientId;}):null;
  if(!selI||!selI.unitPrice) return;
  var amt=parseFloat(d.amount||0);
  var cost=amt>0?calcIngCost(selI,amt,d.unit||selI.unit):0;
  var el=document.getElementById('cd-cost-'+idx);
  if(el){
    el.textContent=cost>0?formatYen(Math.round(cost)):(formatYen(parseFloat(selI.unitPrice))+'/'+selI.unit);
    el.style.color=cost>0?'var(--accent-dark)':'var(--text-muted)';
  }
  updateCoursePreview();
}
function updateElemCostBadge(pi, pj, amtVal){
  courseDishes[pi].elements[pj].amount = amtVal;
  var e = courseDishes[pi].elements[pj];
  var eType = e._type || (e.ingredientId ? 'ingredient' : 'recipe');
  var cost = 0;
  if(eType==='recipe' && e.recipeId){
    var r = DB.recipes.find(function(x){return x.id===e.recipeId;});
    if(r) cost = typeof calcSubRecipeCostByUnit==='function' ? calcSubRecipeCostByUnit(r,e.amount,e.unit) : 0;
  } else if(eType==='ingredient' && e.ingredientId){
    var ing = DB.ingredients.find(function(x){return x.id===e.ingredientId;});
    if(ing && ing.unitPrice) cost = calcIngCost(ing, e.amount, e.unit);
  }
  // バッジ要素を探して更新
  var badge = document.getElementById('cost-badge-'+pi+'-'+pj);
  if(badge){
    badge.textContent = cost>0 ? formatYen(Math.round(cost)) : '';
    badge.style.display = cost>0 ? '' : 'none';
  }
  updateCoursePreview();
}

function updateCoursePreview(){
  var el=document.getElementById('cf-course-preview');if(!el)return;
  var total=courseDishes.reduce(function(s,d){
    if(d.isPlate){
      // プレートの各要素の原価を合計
      return s+(d.elements||[]).reduce(function(ps,e){
        var r=DB.recipes.find(function(x){return x.id===e.recipeId;});
        if(!r) return ps;
        return ps+(typeof calcSubRecipeCostByUnit==='function'
          ?calcSubRecipeCostByUnit(r,e.amount,e.unit)
          :calcRecipeCost(r));
      },0);
    }
    if((d._type==='ingredient'||d.ingredientId)&&!d.recipeId){
      var ing=DB.ingredients.find(function(x){return x.id===d.ingredientId;});
      if(!ing||!ing.unitPrice) return s;
      return s+parseFloat(ing.unitPrice||0)*parseFloat(d.amount||0);
    }
    var r=DB.recipes.find(function(x){return x.id===d.recipeId;});
    if(!r) return s;
    var sc=calcRecipeCost(r); var sv=parseFloat(r.servings||1);
    return s+(sv>0?sc/sv:sc);
  },0);
  // calcCourseNutrition を使って正しく計算（プレート対応・1人分換算）
  var nutr=calcCourseNutrition({dishes:courseDishes});
  var hasNutr=nutr.kcal>0||nutr.protein>0;
  var nutrDiv=hasNutr?'<div id="cf-nutrition" style="display:none;margin-top:8px">'+nutritionHTML(nutr,1)+'</div>':'';
  var priceVal = parseFloat(document.getElementById('cf-price')?.value||0);
  var taxTypeVal = document.getElementById('cf-tax-type')?.value||'10';
  var taxRate = parseFloat(taxTypeVal)/100;
  var priceExcl = priceVal > 0 ? Math.round(priceVal / (1 + taxRate)) : 0;
  var grossProfit = priceExcl - total;
  var grossRate = priceExcl > 0 ? Math.round((1 - total/priceExcl)*100) : 0;
  var costRate = priceExcl > 0 ? Math.round(total/priceExcl*100) : 0;

  // アレルゲン集計
  var allergenSet = new Set();
  courseDishes.forEach(function(d){
    if(d.isPlate){
      (d.elements||[]).forEach(function(e){
        var r=DB.recipes.find(function(x){return x.id===e.recipeId;});
        if(r&&r.allergens) r.allergens.forEach(function(a){allergenSet.add(a);});
      });
    } else {
      var r=DB.recipes.find(function(x){return x.id===d.recipeId;});
      if(r&&r.allergens) r.allergens.forEach(function(a){allergenSet.add(a);});
    }
  });
  var allergenList = Array.from(allergenSet);
  var allergenHtml = allergenList.length > 0
    ? '<div style="margin-top:8px;font-size:11px"><span style="color:var(--text-muted)">アレルゲン: </span>'+allergenList.map(function(a){return '<span style="background:#fff3cd;border-radius:3px;padding:1px 5px;margin:1px;display:inline-block">'+a+'</span>';}).join('')+'</div>'
    : '';

  el.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'
    +'<span>原価: <strong>'+formatYen(total)+'</strong></span>'
    +(priceVal>0?'<span>税抜売値: <strong>'+formatYen(priceExcl)+'</strong></span>':'')
    +(priceVal>0?'<span style="color:'+(costRate>35?'#c0392b':'var(--accent-dark)')+'">原価率: <strong>'+costRate+'%</strong> / 粗利: '+formatYen(grossProfit)+'</span>':'')
    +(hasNutr?'<button id="cf-nutr-btn" style="background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;color:var(--text-muted)">🥗 栄養素</button>':'')
    +'</div>'
    +allergenHtml
    +nutrDiv;
  if(hasNutr){
    var btn=document.getElementById('cf-nutr-btn');
    if(btn) btn.onclick=function(){
      var nd=document.getElementById('cf-nutrition');
      if(nd) nd.style.display=nd.style.display==='none'?'block':'none';
    };
  }
}
